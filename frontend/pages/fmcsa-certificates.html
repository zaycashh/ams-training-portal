<script>

/* ===================================
CERTIFICATE REGISTRY
=================================== */

function registerCertificate(cert){

let registry =
JSON.parse(localStorage.getItem("amsCertificates") || "[]");

const exists =
registry.find(c => c.id === cert.id);

if(!exists){
registry.push(cert);
}

localStorage.setItem(
"amsCertificates",
JSON.stringify(registry)
);

}

</script>

<script>
(function(){

const user = JSON.parse(localStorage.getItem("amsUser") || "null");

if(!user){
window.location.replace("login.html");
return;
}
/* CHECK PURCHASE ACCESS */

const supervisorPurchased =
localStorage.getItem("paid_fmcsa") === "true";

const derPurchased =
localStorage.getItem("paid_der_fmcsa") === "true";

const employeeCompleted =
localStorage.getItem("fmcsaEmployeeCompleted") === "true";

/*
Allow certificate page if ANY valid FMCSA path exists
*/

if(!supervisorPurchased && !derPurchased && !employeeCompleted){
alert("FMCSA Training requires purchase.");
window.location.replace("dashboard.html");
return;
}
  
/* CHECK CERTIFICATE COMPLETION */

const modACompleted =
localStorage.getItem("fmcsaModuleACompleted") === "true";

const modBCompleted =
localStorage.getItem("fmcsaModuleBCompleted") === "true";

const derCompleted =
localStorage.getItem("fmcsaDERCompleted") === "true";

if(!modACompleted && !modBCompleted && !derCompleted && !employeeCompleted){
window.location.replace("dashboard.html");
return;
}
  
/* OPTIONAL 30 DAY EXPIRATION */

const start = localStorage.getItem("fmcsa_start_date");

if(start){

const DAY_MS = 86400000;
const LIMIT_DAYS = 30;

const elapsed = Date.now() - Number(start);
const daysUsed = Math.floor(elapsed / DAY_MS);

if(daysUsed >= LIMIT_DAYS){

alert("FMCSA training window expired. Repurchase required.");
window.location.replace("dashboard.html");
return;

}

}

})();
</script>

<script>

/* ===================================
LOAD CERTIFICATES
=================================== */

document.addEventListener("DOMContentLoaded",()=>{

const user = JSON.parse(localStorage.getItem("amsUser") || "{}");

const modACompleted =
localStorage.getItem("fmcsaModuleACompleted") === "true";

const modBCompleted =
localStorage.getItem("fmcsaModuleBCompleted") === "true";

const derCompleted =
localStorage.getItem("fmcsaDERCompleted") === "true";

const employeeCompleted =
localStorage.getItem("fmcsaEmployeeCompleted") === "true";  

/* IF NOTHING COMPLETED RETURN */

if(!modACompleted && !modBCompleted && !derCompleted && !employeeCompleted){
window.location.replace("dashboard.html");
return;
}
// AUTO SELECT BEST CERT
if(employeeCompleted){
showCert("employee");
}
else if(derCompleted){
showCert("der");
}
else if(modACompleted){
showCert("supervisor");
}
  
/* ===============================
MODULE A
=============================== */

if(modACompleted){

const storedADate =
localStorage.getItem("fmcsaModuleADate");

const certIdA =
localStorage.getItem("fmcsaModuleACertificateId");

if(certIdA){

registerCertificate({
id: certIdA,
name: user.fullName || user.email,
course: "FMCSA Reasonable Suspicion Training",
date: storedADate
});

const verifyUrl =
window.location.origin +
"/ams-training-portal/frontend/pages/verify.html?id=" +
certIdA;

/* SHOW SUPERVISOR CERTIFICATE TEMPLATE */

document.getElementById("supervisorCertTemplate").classList.remove("hidden");

document.getElementById("certStudentName").textContent =
user.fullName ||
((user.firstName || "") + " " + (user.lastName || "")).trim() ||
user.email ||
"User";

document.getElementById("certCompletionDate").textContent =
new Date(Number(storedADate)).toLocaleDateString("en-US");

document.getElementById("certCertificateId").textContent =
"Certificate ID: " + certIdA;
  
const certIdB =
localStorage.getItem("fmcsaModuleBCertificateId");

if(certIdB){

document.getElementById("certCertificateIdB").textContent =
"Drug & Alcohol ID: " + certIdB;

}

/* TEMPLATE QR */

const qrContainer = document.getElementById("certQR");

qrContainer.innerHTML = "";

new QRCode(qrContainer,{
text: verifyUrl,
width:90,
height:90
});

}

}
/* ===============================
MODULE B
=============================== */

if(modBCompleted){

const storedBDate =
localStorage.getItem("fmcsaModuleBDate");

const certIdB =
localStorage.getItem("fmcsaModuleBCertificateId");

if(certIdB){

registerCertificate({
id: certIdB,
name: user.fullName || user.email,
course: "FMCSA Drug & Alcohol Substance Abuse Training",
date: storedBDate
});

}

if(certIdB){

const verifyUrl =
window.location.origin +
"/ams-training-portal/frontend/pages/verify.html?id=" +
certIdB;

}

}

/* ===============================
DER CERTIFICATE
=============================== */

if(derCompleted){

const storedDate =
localStorage.getItem("fmcsaDERDate");


const certIdDER =
localStorage.getItem("fmcsaDERCertificateId");
  if(certIdDER){

registerCertificate({
id: certIdDER,
name: user.fullName || user.email,
course: "FMCSA DER Training",
date: storedDate
});

}

if(certIdDER){

const verifyUrl =
window.location.origin +
"/ams-training-portal/frontend/pages/verify.html?id=" +
certIdDER;

/* SHOW DER CERTIFICATE TEMPLATE */

document.getElementById("derCertTemplate").classList.remove("hidden");

/* NAME */

document.getElementById("derCertStudentName").textContent =
user.fullName ||
((user.firstName || "") + " " + (user.lastName || "")).trim() ||
user.email ||
"User";

/* DATE */

document.getElementById("derCertCompletionDate").textContent =
new Date(Number(storedDate)).toLocaleDateString("en-US");

/* CERT ID */

document.getElementById("derCertCertificateId").textContent =
"Certificate ID: " + certIdDER;

/* TEMPLATE QR */

const qrContainer = document.getElementById("derCertQR");

qrContainer.innerHTML = "";

new QRCode(qrContainer,{
text: verifyUrl,
width:90,
height:90
});

}

}
  
 /* ===============================
FMCSA EMPLOYEE CERTIFICATE
=============================== */

if(employeeCompleted){

/* DATE */
const storedDate =
localStorage.getItem("fmcsaEmployeeDate");


/* CERT ID */
let certId =
localStorage.getItem("fmcsaEmployeeCertificateId");

/* GENERATE IF MISSING */
if(!certId){
certId = "AMS-FMCSA-EMP-CERT-" +
Math.random().toString(16).substring(2,10).toUpperCase();

localStorage.setItem("fmcsaEmployeeCertificateId", certId);
}

/* REGISTER */
registerCertificate({
id: certId,
name: user.fullName || user.email,
course: "FMCSA Employee Awareness Training",
date: storedDate
});

/* QR (CARD) */
const verifyUrl =
window.location.origin +
"/ams-training-portal/frontend/pages/verify.html?id=" +
certId;

// ===============================
// 👉 EMPLOYEE CERT TEMPLATE
// ===============================

document.getElementById("employeeCertTemplate").classList.remove("hidden");

/* NAME */
document.getElementById("empCertStudentName").textContent =
user.fullName ||
((user.firstName || "") + " " + (user.lastName || "")).trim() ||
user.email ||
"User";

/* DATE */
document.getElementById("empCertCompletionDate").textContent =
new Date(Number(storedDate)).toLocaleDateString("en-US");

/* CERT ID */
document.getElementById("empCertCertificateId").textContent =
"Certificate ID: " + certId;

/* QR (TEMPLATE) */
const qrTemplate = document.getElementById("empCertQR");
qrTemplate.innerHTML = "";

new QRCode(qrTemplate,{
text: verifyUrl,
width:90,
height:90
});

}

});
</script>

<!-- SECOND SCRIPT (BUTTONS / TABS) -->
<script>

/* RETURN BUTTON */
function returnToDashboard(){
window.location.href = "dashboard.html";
}

/* TAB SWITCHER */
function showCert(type){

// hide all
document.getElementById("employeeCertTemplate").classList.add("hidden");
document.getElementById("supervisorCertTemplate").classList.add("hidden");
document.getElementById("derCertTemplate").classList.add("hidden");

// remove active
document.getElementById("tab-employee").classList.remove("active");
document.getElementById("tab-supervisor").classList.remove("active");
document.getElementById("tab-der").classList.remove("active");

// show selected
if(type === "employee"){
document.getElementById("employeeCertTemplate").classList.remove("hidden");
document.getElementById("tab-employee").classList.add("active");
}

if(type === "supervisor"){
document.getElementById("supervisorCertTemplate").classList.remove("hidden");
document.getElementById("tab-supervisor").classList.add("active");
}

if(type === "der"){
document.getElementById("derCertTemplate").classList.remove("hidden");
document.getElementById("tab-der").classList.add("active");
}

}

</script>
