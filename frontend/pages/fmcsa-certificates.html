<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FMCSA Certificates | AMS Training Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../css/main.css" />

<style>
.cert-container{ max-width:900px; margin:auto; }
.hidden{ display:none; }

/* PRINT */
.print-mode * { visibility:hidden; }
.print-mode .active-cert,
.print-mode .active-cert * { visibility:visible; }

.print-mode .active-cert{
position:fixed;
top:0;
left:0;
width:100%;
}
</style>
</head>

<body>

<main class="module-container cert-container">

<header class="module-header">
<h1>FMCSA Training Certificates</h1>

<button onclick="printCert()">🖨 Print</button>
<button onclick="returnToDashboard()">Return to Dashboard</button>
</header>

<!-- =======================
CERT TEMPLATES (UNCHANGED)
======================= -->

<div id="employeeCertTemplate" class="hidden active-cert">
<img src="../assets/certificates/fmcsa-employee-template.png" style="width:100%;">

<img src="../assets/certificates/ams-seal.png"
style="position:absolute; bottom:90px; left:160px; width:120px;">

<div id="empCertStudentName" style="position:absolute; top:170px; left:50%; transform:translateX(-50%); font-size:30px; font-weight:bold;"></div>
<div id="empCertCompletionDate" style="position:absolute; top:292px; left:539px;"></div>
<div id="empCertCertificateId" style="position:absolute; top:455px; left:350px;"></div>
<div id="empCertQR" style="position:absolute; bottom:90px; right:150px;"></div>
</div>

<div id="supervisorCertTemplate" class="hidden active-cert">
<img src="../assets/certificates/fmcsa-supervisor-template.png" style="width:100%;">

<img src="../assets/certificates/ams-seal.png"
style="position:absolute; bottom:90px; left:160px; width:120px;">

<div id="certStudentName" style="position:absolute; top:184px; width:100%; text-align:center; font-size:32px;"></div>
<div id="certCompletionDate" style="position:absolute; top:383px; left:548px;"></div>
<div id="certCertificateId" style="position:absolute; top:454px; left:350px;"></div>
<div id="certQR" style="position:absolute; bottom:90px; right:150px;"></div>
</div>

<div id="derCertTemplate" class="hidden active-cert">
<img src="../assets/certificates/fmcsa-der-template.png" style="width:100%;">

<img src="../assets/certificates/ams-seal.png"
style="position:absolute; bottom:90px; left:160px; width:120px;">

<div id="derCertStudentName" style="position:absolute; top:184px; width:100%; text-align:center; font-size:32px;"></div>
<div id="derCertCompletionDate" style="position:absolute; top:306px; left:535px;"></div>
<div id="derCertCertificateId" style="position:absolute; top:470px; left:350px;"></div>
<div id="derCertQR" style="position:absolute; bottom:90px; right:150px;"></div>
</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

/* =========================
RETURN DASHBOARD (FIXED)
========================= */
function returnToDashboard(){
  const user = JSON.parse(localStorage.getItem("amsUser") || "{}");

  if(user.id && user.id.startsWith("admin-")){
    window.location.href = "company-dashboard.html";
  } else {
    window.location.href = "dashboard.html";
  }
}

/* =========================
SHOW CERT
========================= */
function showCert(type){
  document.getElementById("employeeCertTemplate").classList.add("hidden");
  document.getElementById("supervisorCertTemplate").classList.add("hidden");
  document.getElementById("derCertTemplate").classList.add("hidden");

  document.getElementById(type + "CertTemplate").classList.remove("hidden");
}

/* =========================
PRINT
========================= */
function printCert(){
  document.body.classList.add("print-mode");
  setTimeout(()=>window.print(),100);
}

/* =========================
LOAD CERT (FIXED CLEAN)
========================= */
document.addEventListener("DOMContentLoaded", () => {

const user = JSON.parse(localStorage.getItem("amsUser") || "{}");
const email = user.email;

const params = new URLSearchParams(window.location.search);
const certId = params.get("id");

let selectedCert = null;

/* 🔥 SEARCH ALL CERTS (ADMIN SAFE) */
for(let key in localStorage){
  if(key.startsWith("amsCertificates_")){
    const list = JSON.parse(localStorage.getItem(key) || "[]");
    const found = list.find(c => c.id === certId);
    if(found){
      selectedCert = found;
      break;
    }
  }
}

if(!selectedCert){
  alert("Certificate not found");
  return;
}

/* SHOW TYPE */
if(selectedCert.type === "fmcsa_employee"){
  showCert("employee");
}
else if(selectedCert.type === "fmcsa_der"){
  showCert("der");
}
else{
  showCert("supervisor");
}

/* =========================
FILL DATA
========================= */

const name =
user.fullName ||
`${user.firstName || ""} ${user.lastName || ""}`.trim() ||
user.email;

/* EMPLOYEE */
if(selectedCert.type === "fmcsa_employee"){
  document.getElementById("empCertStudentName").textContent = name;
  document.getElementById("empCertCompletionDate").textContent =
    new Date(selectedCert.date).toLocaleDateString();

  document.getElementById("empCertCertificateId").textContent =
    "Certificate ID: " + selectedCert.id;

  new QRCode(document.getElementById("empCertQR"), {
    text: window.location.href,
    width: 90,
    height: 90
  });
}

/* SUPERVISOR */
if(selectedCert.type === "fmcsa_supervisor"){
  document.getElementById("certStudentName").textContent = name;
  document.getElementById("certCompletionDate").textContent =
    new Date(selectedCert.date).toLocaleDateString();

  document.getElementById("certCertificateId").textContent =
    "Certificate ID: " + selectedCert.id;

  new QRCode(document.getElementById("certQR"), {
    text: window.location.href,
    width: 90,
    height: 90
  });
}

/* DER */
if(selectedCert.type === "fmcsa_der"){
  document.getElementById("derCertStudentName").textContent = name;
  document.getElementById("derCertCompletionDate").textContent =
    new Date(selectedCert.date).toLocaleDateString();

  document.getElementById("derCertCertificateId").textContent =
    "Certificate ID: " + selectedCert.id;

  new QRCode(document.getElementById("derCertQR"), {
    text: window.location.href,
    width: 90,
    height: 90
  });
}

});

</script>

</body>
</html>
