<script>

function registerCertificate(cert){

  const user = JSON.parse(localStorage.getItem("amsUser") || "null");
  if(!user) return;

  const key = `amsCertificates_${user.email}`;

  let registry = JSON.parse(localStorage.getItem(key) || "[]");

  const exists = registry.find(c => c.id === cert.id);

  if(!exists){
    registry.push(cert);
  }

  localStorage.setItem(key, JSON.stringify(registry));
}
</script>

<script>
(function(){

const user = JSON.parse(localStorage.getItem("amsUser") || "null");

if(!user){
window.location.replace("login.html");
return;
}
/* CHECK PURCHASE ACCESS */

const supervisorPurchased =
localStorage.getItem("paid_fmcsa") === "true";

const derPurchased =
localStorage.getItem("paid_der_fmcsa") === "true";

const employeeCompleted =
localStorage.getItem("fmcsaEmployeeCompleted") === "true";

/*
Allow certificate page if ANY valid FMCSA path exists
*/

if(!supervisorPurchased && !derPurchased && !employeeCompleted){
alert("FMCSA Training requires purchase.");
window.location.replace("dashboard.html");
return;
}
  
/* CHECK CERTIFICATE COMPLETION */

const modACompleted =
localStorage.getItem("fmcsaModuleACompleted") === "true";

const modBCompleted =
localStorage.getItem("fmcsaModuleBCompleted") === "true";

const derCompleted =
localStorage.getItem("fmcsaDERCompleted") === "true";

if(!modACompleted && !modBCompleted && !derCompleted && !employeeCompleted){
window.location.replace("dashboard.html");
return;
}
  
/* OPTIONAL 30 DAY EXPIRATION */

const start = localStorage.getItem("fmcsa_start_date");

if(start){

const DAY_MS = 86400000;
const LIMIT_DAYS = 30;

const elapsed = Date.now() - Number(start);
const daysUsed = Math.floor(elapsed / DAY_MS);

if(daysUsed >= LIMIT_DAYS){

alert("FMCSA training window expired. Repurchase required.");
window.location.replace("dashboard.html");
return;

}

}

})();
</script>

<script>

/* ===================================
LOAD CERTIFICATES
=================================== */

document.addEventListener("DOMContentLoaded",()=>{

const user = JSON.parse(localStorage.getItem("amsUser") || "{}");

const modACompleted =
localStorage.getItem("fmcsaModuleACompleted") === "true";

const modBCompleted =
localStorage.getItem("fmcsaModuleBCompleted") === "true";

const derCompleted =
localStorage.getItem("fmcsaDERCompleted") === "true";

const employeeCompleted =
localStorage.getItem("fmcsaEmployeeCompleted") === "true";  

/* IF NOTHING COMPLETED RETURN */

if(!modACompleted && !modBCompleted && !derCompleted && !employeeCompleted){
  window.location.replace("dashboard.html");
  return;
}

/* ===============================
URL CONTROL (FIXED - CLEAN)
=============================== */

const params = new URLSearchParams(window.location.search);
const certId = params.get("id");
const type = params.get("type");

let selectedCert = null;

/* ===============================
LOAD CERT FROM REGISTRY
=============================== */

if (certId) {

  const user = JSON.parse(localStorage.getItem("amsUser") || "{}");
  const key = `amsCertificates_${user.email}`;
  const certs = JSON.parse(localStorage.getItem(key) || "[]");

  selectedCert = certs.find(c => c.id === certId);

  if (!selectedCert) {
    alert("Certificate not found");
    return;
  }

}

/* ===============================
SHOW BASED ON CERT (NO GUESSING)
=============================== */

if (selectedCert) {

  if (selectedCert.course.includes("Employee")) {
    showCert("employee");
  }
  else if (selectedCert.course.includes("DER")) {
    showCert("der");
  }
  else if (selectedCert.course.includes("Reasonable")) {
    showCert("supervisor");
  }
  else {
    // fallback safety
    showCert("supervisor");
  }

}

/* ===============================
OPTIONAL TYPE (MANUAL VIEW)
=============================== */

else if (type) {

  showCert(type);

}

/* ===============================
NO CERT = STOP (IMPORTANT)
=============================== */

else {

  alert("No certificate selected.");
  return;

}
  
/* ===============================
MODULE A (FIXED - NO MIXING)
=============================== */

if (selectedCert && selectedCert.course.includes("Reasonable")) {

  const storedADate = selectedCert.date;
  const certIdA = selectedCert.id;

  if (certIdA) {

    registerCertificate({
      id: certIdA,
      name: selectedCert.name,
      course: "FMCSA Supervisor Reasonable Suspicion Training",
      date: storedADate
    });

    const verifyUrl =
      window.location.origin +
      "/ams-training-portal/frontend/pages/verify.html?id=" +
      certIdA;

    /* ===============================
       SHOW SUPERVISOR TEMPLATE
    =============================== */

    document.getElementById("certStudentName").textContent =
      selectedCert.name;

    document.getElementById("certCompletionDate").textContent =
      new Date(Number(storedADate)).toLocaleDateString("en-US");

    document.getElementById("certCertificateId").textContent =
      "Certificate ID: " + certIdA;

    /* OPTIONAL: MODULE B ID (ONLY IF SAME CERT TYPE) */
    const certIdB = localStorage.getItem("fmcsaModuleBCertificateId");

    if (certIdB) {
      document.getElementById("certCertificateIdB").textContent =
        "Drug & Alcohol ID: " + certIdB;
    }

    /* QR CODE */
    const qrContainer = document.getElementById("certQR");
    qrContainer.innerHTML = "";

    new QRCode(qrContainer, {
      text: verifyUrl,
      width: 90,
      height: 90
    });

  }

}
/* ===============================
MODULE B (FIXED - NO MIXING)
=============================== */

if (selectedCert && selectedCert.course.includes("Drug")) {

  const storedBDate = selectedCert.date;
  const certIdB = selectedCert.id;

  if (certIdB) {

    registerCertificate({
      id: certIdB,
      name: selectedCert.name,
      course: "FMCSA Drug & Alcohol Substance Abuse Training",
      date: storedBDate
    });

    const verifyUrl =
      window.location.origin +
      "/ams-training-portal/frontend/pages/verify.html?id=" +
      certIdB;

    /* (OPTIONAL IF YOU SHOW THIS CERT ON TEMPLATE LATER) */
    console.log("Module B Cert Loaded:", certIdB);

  }

}


if(certIdB){

const verifyUrl =
window.location.origin +
"/ams-training-portal/frontend/pages/verify.html?id=" +
certIdB;

}

}

/* ===============================
DER CERTIFICATE (FIXED - NO MIXING)
=============================== */

if (selectedCert && selectedCert.course.includes("DER")) {

  const storedDate = selectedCert.date;
  const certIdDER = selectedCert.id;

  if (certIdDER) {

    registerCertificate({
      id: certIdDER,
      name: selectedCert.name,
      course: "FMCSA DER Training",
      date: storedDate
    });

    const verifyUrl =
      window.location.origin +
      "/ams-training-portal/frontend/pages/verify.html?id=" +
      certIdDER;

    /* NAME */
    document.getElementById("derCertStudentName").textContent =
      selectedCert.name;

    /* DATE */
    document.getElementById("derCertCompletionDate").textContent =
      new Date(Number(storedDate)).toLocaleDateString("en-US");

    /* CERT ID */
    document.getElementById("derCertCertificateId").textContent =
      "Certificate ID: " + certIdDER;

    /* QR */
    const qrContainer = document.getElementById("derCertQR");
    qrContainer.innerHTML = "";

    new QRCode(qrContainer, {
      text: verifyUrl,
      width: 90,
      height: 90
    });

  }

}

/* ===============================
FMCSA EMPLOYEE CERTIFICATE (FIXED)
=============================== */

if (selectedCert && selectedCert.course.includes("Employee")) {

  const storedDate = selectedCert.date;
  const certId = selectedCert.id;

  if (certId) {

    registerCertificate({
      id: certId,
      name: selectedCert.name,
      course: "FMCSA Employee Awareness Training",
      date: storedDate
    });

    const verifyUrl =
      window.location.origin +
      "/ams-training-portal/frontend/pages/verify.html?id=" +
      certId;

    /* NAME */
    document.getElementById("empCertStudentName").textContent =
      selectedCert.name;

    /* DATE */
    document.getElementById("empCertCompletionDate").textContent =
      new Date(Number(storedDate)).toLocaleDateString("en-US");

    /* CERT ID */
    document.getElementById("empCertCertificateId").textContent =
      "Certificate ID: " + certId;

    /* QR */
    const qrTemplate = document.getElementById("empCertQR");
    qrTemplate.innerHTML = "";

    new QRCode(qrTemplate, {
      text: verifyUrl,
      width: 90,
      height: 90
    });

  }

}
  
</script>

<!-- SECOND SCRIPT (BUTTONS / TABS) -->
<script>

function returnToDashboard(){
  window.location.href = "dashboard.html";
}

function showCert(type){

// hide all
document.getElementById("employeeCertTemplate").classList.add("hidden");
document.getElementById("supervisorCertTemplate").classList.add("hidden");
document.getElementById("derCertTemplate").classList.add("hidden");

// show selected
if(type === "employee"){
  document.getElementById("employeeCertTemplate").classList.remove("hidden");
}

if(type === "supervisor"){
  document.getElementById("supervisorCertTemplate").classList.remove("hidden");
}

if(type === "der"){
  document.getElementById("derCertTemplate").classList.remove("hidden");
}

}

function printCert(){

  const cert = document.querySelector(
    "#employeeCertTemplate:not(.hidden), #supervisorCertTemplate:not(.hidden), #derCertTemplate:not(.hidden)"
  );

  if(!cert){
    alert("No certificate found.");
    return;
  }

  document.body.classList.add("print-mode");

  setTimeout(() => {
    window.print();
    document.body.classList.remove("print-mode");
  }, 100);
}  
  
</script>
