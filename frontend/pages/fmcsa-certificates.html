<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FMCSA Certificates | AMS Training Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../css/main.css" />

<style>
.cert-container{
max-width:900px;
margin:auto;
}

.hidden{
display:none;
}

.btn-print{
padding:8px 14px;
background:#1e3a8a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.btn-secondary{
padding:8px 14px;
background:#e5e7eb;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<main class="cert-container">

<header class="module-header">
<h1>FMCSA Training Certificates</h1>

<button class="btn-print" onclick="printCert()">🖨 Print</button>

<button class="btn-secondary"
onclick="window.location.href='company-dashboard.html'">
Return to Dashboard
</button>

</header>

<!-- EMPLOYEE -->
<div id="employeeCertTemplate" class="hidden">
  <h2 id="empCertStudentName"></h2>
  <p id="empCertCompletionDate"></p>
  <p id="empCertCertificateId"></p>
  <div id="empCertQR"></div>
</div>

<!-- DER -->
<div id="derCertTemplate" class="hidden">
  <h2 id="derCertStudentName"></h2>
  <p id="derCertCompletionDate"></p>
  <p id="derCertCertificateId"></p>
  <div id="derCertQR"></div>
</div>

<!-- SUPERVISOR -->
<div id="supervisorCertTemplate" class="hidden">
  <h2 id="certStudentName"></h2>
  <p id="certCompletionDate"></p>
  <p id="certCertificateId"></p>
  <div id="certQR"></div>
</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const user = JSON.parse(localStorage.getItem("amsUser") || "{}");
  const email = user?.email;

  const params = new URLSearchParams(window.location.search);
  const certId = params.get("id");

  /* ===============================
     🚀 COMPANY ADMIN SAFE ACCESS
  =============================== */

  const role = user?.role;

  if (!certId && role !== "company_admin") {
    window.location.href = "dashboard.html";
    return;
  }

  /* ===============================
     FIND CERT (KEY FIX)
  =============================== */

  let foundCert = null;

  // 🔥 SEARCH ALL USERS (THIS FIXES YOUR ISSUE)
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);

    if (key.startsWith("amsCertificates_")) {

      const certs = JSON.parse(localStorage.getItem(key) || "[]");

      const match = certs.find(c => c.id === certId);

      if (match) {
        foundCert = match;
        break;
      }
    }
  }

  if (!foundCert) {
    alert("Certificate not found");
    return;
  }

  /* ===============================
     SHOW CORRECT TEMPLATE
  =============================== */

  function showCert(type){
    document.getElementById("employeeCertTemplate").classList.add("hidden");
    document.getElementById("derCertTemplate").classList.add("hidden");
    document.getElementById("supervisorCertTemplate").classList.add("hidden");

    if(type === "employee"){
      document.getElementById("employeeCertTemplate").classList.remove("hidden");
    }

    if(type === "der"){
      document.getElementById("derCertTemplate").classList.remove("hidden");
    }

    if(type === "supervisor"){
      document.getElementById("supervisorCertTemplate").classList.remove("hidden");
    }
  }

  /* ===============================
     LOAD DATA
  =============================== */

  const verifyUrl =
    window.location.origin +
    "/ams-training-portal/frontend/pages/verify.html?id=" +
    foundCert.id;

  const name =
    foundCert.name ||
    user.fullName ||
    user.email;

  const date =
    foundCert.displayDate ||
    new Date(foundCert.date).toLocaleDateString("en-US");

  /* ===============================
     TYPE ROUTING
  =============================== */

  if (foundCert.type === "fmcsa_employee") {

    showCert("employee");

    document.getElementById("empCertStudentName").textContent = name;
    document.getElementById("empCertCompletionDate").textContent = date;
    document.getElementById("empCertCertificateId").textContent = "Certificate ID: " + foundCert.id;

    new QRCode(document.getElementById("empCertQR"), {
      text: verifyUrl,
      width: 90,
      height: 90
    });

  } 
  else if (foundCert.type === "fmcsa_der") {

    showCert("der");

    document.getElementById("derCertStudentName").textContent = name;
    document.getElementById("derCertCompletionDate").textContent = date;
    document.getElementById("derCertCertificateId").textContent = "Certificate ID: " + foundCert.id;

    new QRCode(document.getElementById("derCertQR"), {
      text: verifyUrl,
      width: 90,
      height: 90
    });

  } 
  else {

    showCert("supervisor");

    document.getElementById("certStudentName").textContent = name;
    document.getElementById("certCompletionDate").textContent = date;
    document.getElementById("certCertificateId").textContent = "Certificate ID: " + foundCert.id;

    new QRCode(document.getElementById("certQR"), {
      text: verifyUrl,
      width: 90,
      height: 90
    });

  }

});

/* ===============================
   PRINT
=============================== */
function printCert(){
  window.print();
}
</script>

</body>
</html>
