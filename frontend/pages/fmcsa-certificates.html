<script>

/* ===================================
CERTIFICATE REGISTRY
=================================== */

function registerCertificate(cert){

const user = JSON.parse(localStorage.getItem("amsUser") || "null");
if(!user) return;

const key = `amsCertificates_${user.email}`;

let registry =
JSON.parse(localStorage.getItem(key) || "[]");

const exists = registry.find(c => c.id === cert.id);

if(!exists){
  registry.push(cert);
}

localStorage.setItem(key, JSON.stringify(registry));
}

</script>

<script>
(function(){

const user = JSON.parse(localStorage.getItem("amsUser") || "null");

if(!user){
window.location.replace("login.html");
return;
}

/* ===============================
CHECK PURCHASE ACCESS (FIXED)
=============================== */

const supervisorPurchased =
  localStorage.getItem(`paid_fmcsa_${user.email}`) === "true";

const derPurchased =
  localStorage.getItem(`paid_der_fmcsa_${user.email}`) === "true";

const employeeCompleted =
  localStorage.getItem(`fmcsaEmployeeCompleted_${user.email}`) === "true";

/* ===============================
ACCESS CONTROL
=============================== */

if (
  (!supervisorPurchased && !derPurchased && !employeeCompleted) ||
  (!modACompleted && !modBCompleted && !derCompleted && !employeeCompleted)
) {
  alert("FMCSA Training requires purchase.");
  window.location.replace("dashboard.html");
  return;
}
/* ✅ FIXED COMPLETION FLAGS */

const modACompleted =
  localStorage.getItem(`fmcsaModuleACompleted_${user.email}`) === "true";

const modBCompleted =
  localStorage.getItem(`fmcsaModuleBCompleted_${user.email}`) === "true";

const derCompleted =
  localStorage.getItem(`fmcsaDERCompleted_${user.email}`) === "true";

/* ===============================
FINAL ACCESS CHECK
=============================== */

if (
  !modACompleted &&
  !modBCompleted &&
  !derCompleted &&
  !employeeCompleted
) {
  window.location.replace("dashboard.html");
  return;
}
  
/* OPTIONAL 30 DAY EXPIRATION */

const start = localStorage.getItem("fmcsa_start_date");

if(start){

const DAY_MS = 86400000;
const LIMIT_DAYS = 30;

const elapsed = Date.now() - Number(start);
const daysUsed = Math.floor(elapsed / DAY_MS);

if(daysUsed >= LIMIT_DAYS){

alert("FMCSA training window expired. Repurchase required.");
window.location.replace("dashboard.html");
return;

}

}

})();
</script>

<script>

/* ===================================
LOAD CERTIFICATES
=================================== */

document.addEventListener("DOMContentLoaded",()=>{

const user = JSON.parse(localStorage.getItem("amsUser") || "{}");
const email = user?.email;

  if(!modACompleted && !modBCompleted && !derCompleted && !employeeCompleted){
  window.location.replace("dashboard.html");
  return;

const modACompleted =
localStorage.getItem(`fmcsaModuleACompleted_${user.email}`) === "true";

const modBCompleted =
localStorage.getItem(`fmcsaModuleBCompleted_${user.email}`) === "true";

const derCompleted =
localStorage.getItem(`fmcsaDERCompleted_${user.email}`) === "true";

const employeeCompleted =
localStorage.getItem(`fmcsaEmployeeCompleted_${user.email}`) === "true";  

}

/* ===============================
URL CONTROL (STEP 1 FIX)
=============================== */

const params = new URLSearchParams(window.location.search);
const certId = params.get("id");
const type = params.get("type");

let selectedCert = null;

/* LOAD FROM REGISTRY IF ID EXISTS */
if(certId){

  const key = `amsCertificates_${user.email}`;
  const registry = JSON.parse(localStorage.getItem(key) || "[]");

  selectedCert = registry.find(c => c.id === certId);

  if(!selectedCert){
    alert("Certificate not found");
    return;
  }

  /* FORCE TEMPLATE BASED ON CERT */
  if(selectedCert.course.includes("Employee")){
    showCert("employee");
  }
  else if(selectedCert.course.includes("DER")){
    showCert("der");
  }
  else{
    showCert("supervisor");
  }

}else{

  /* OLD FALLBACK (KEEP FOR NOW) */
  if(type){
    showCert(type);
  }else{
    if(employeeCompleted){
      showCert("employee");
    }
    else if(derCompleted){
      showCert("der");
    }
    else if(modACompleted){
      showCert("supervisor");
    }
  }

}
  
/* ===============================
MODULE A (FIXED - PER USER)
=============================== */

if (modACompleted) {

  const certIdA =
    localStorage.getItem(`fmcsaModuleACertificateId_${user.email}`);

  const storedADate =
    localStorage.getItem(`fmcsaModuleADate_${user.email}`);

  if (certIdA) {

    registerCertificate({
      id: certIdA,
      name:
        user.fullName ||
        `${user.firstName || ""} ${user.lastName || ""}`.trim() ||
        user.email,
      course: "FMCSA Reasonable Suspicion Training",
      date: storedADate
    });

    const verifyUrl =
      window.location.origin +
      "/ams-training-portal/frontend/pages/verify.html?id=" +
      certIdA;

  }

}

/* ===============================
SUPERVISOR CERTIFICATE DISPLAY
=============================== */

/* PER USER KEYS */
const certIdA = localStorage.getItem(`fmcsaModuleACertificateId_${email}`);
const certIdB = localStorage.getItem(`fmcsaModuleBCertificateId_${email}`);

const storedADate = localStorage.getItem(`fmcsaModuleADate_${email}`);
const storedBDate = localStorage.getItem(`fmcsaModuleBDate_${email}`);

/* NAME */
document.getElementById("certStudentName").textContent =
  user.fullName ||
  `${user.firstName || ""} ${user.lastName || ""}`.trim() ||
  user.email ||
  "User";

/* DATE (USE MODULE B DATE IF EXISTS, ELSE A) */
const finalDate = storedBDate || storedADate;

document.getElementById("certCompletionDate").textContent =
  finalDate ? new Date(Number(finalDate)).toLocaleDateString("en-US") : "";

/* CERT ID A */
if (certIdA) {
  document.getElementById("certCertificateId").textContent =
    "Certificate ID: " + certIdA;
}

/* CERT ID B */
if (certIdB) {
  document.getElementById("certCertificateIdB").textContent =
    "Drug & Alcohol ID: " + certIdB;
}

/* QR CODE (USE MODULE B IF EXISTS ELSE A) */
const finalCertId = certIdB || certIdA;

if (finalCertId) {

  const verifyUrl =
    window.location.origin +
    "/ams-training-portal/frontend/pages/verify.html?id=" +
    finalCertId;

  const qrContainer = document.getElementById("certQR");
  qrContainer.innerHTML = "";

  new QRCode(qrContainer, {
    text: verifyUrl,
    width: 90,
    height: 90
  });

}

/* ===============================
DER CERTIFICATE (FIXED - PER USER)
=============================== */

if (derCompleted) {

  const certIdDER =
    localStorage.getItem(`fmcsaDERCertificateId_${user.email}`);

  const storedDate =
    localStorage.getItem(`fmcsaDERDate_${user.email}`);

  if (certIdDER) {

    registerCertificate({
      id: certIdDER,
      name:
        user.fullName ||
        `${user.firstName || ""} ${user.lastName || ""}`.trim() ||
        user.email,
      course: "FMCSA DER Training",
      date: storedDate
    });

    const verifyUrl =
      window.location.origin +
      "/ams-training-portal/frontend/pages/verify.html?id=" +
      certIdDER;

    /* NAME */
    document.getElementById("derCertStudentName").textContent =
      user.fullName ||
      `${user.firstName || ""} ${user.lastName || ""}`.trim() ||
      user.email ||
      "User";

    /* DATE */
    document.getElementById("derCertCompletionDate").textContent =
      storedDate
        ? new Date(Number(storedDate)).toLocaleDateString("en-US")
        : "";

    /* CERT ID */
    document.getElementById("derCertCertificateId").textContent =
      "Certificate ID: " + certIdDER;

    /* QR */
    const qrContainer = document.getElementById("derCertQR");
    qrContainer.innerHTML = "";

    new QRCode(qrContainer, {
      text: verifyUrl,
      width: 90,
      height: 90
    });

  }

}
  
 /* ===============================
FMCSA EMPLOYEE CERTIFICATE (FIXED - PER USER)
=============================== */

if (employeeCompleted) {

  const certId =
    localStorage.getItem(`fmcsaEmployeeCertificateId_${user.email}`);

  const storedDate =
    localStorage.getItem(`fmcsaEmployeeDate_${user.email}`);

  let finalCertId = certId;

  /* GENERATE IF MISSING */
  if (!finalCertId) {
    finalCertId =
      "AMS-FMCSA-EMP-CERT-" +
      Math.random().toString(16).substring(2, 10).toUpperCase();

    localStorage.setItem(
      `fmcsaEmployeeCertificateId_${user.email}`,
      finalCertId
    );
  }

  /* REGISTER */
  registerCertificate({
    id: finalCertId,
    name:
      user.fullName ||
      `${user.firstName || ""} ${user.lastName || ""}`.trim() ||
      user.email,
    course: "FMCSA Employee Awareness Training",
    date: storedDate
  });

  const verifyUrl =
    window.location.origin +
    "/ams-training-portal/frontend/pages/verify.html?id=" +
    finalCertId;

  /* NAME */
  document.getElementById("empCertStudentName").textContent =
    user.fullName ||
    `${user.firstName || ""} ${user.lastName || ""}`.trim() ||
    user.email ||
    "User";

  /* DATE */
  document.getElementById("empCertCompletionDate").textContent =
    storedDate
      ? new Date(Number(storedDate)).toLocaleDateString("en-US")
      : "";

  /* CERT ID */
  document.getElementById("empCertCertificateId").textContent =
    "Certificate ID: " + finalCertId;

  /* QR */
  const qrTemplate = document.getElementById("empCertQR");
  qrTemplate.innerHTML = "";

  new QRCode(qrTemplate, {
    text: verifyUrl,
    width: 90,
    height: 90
  });

}

// ===============================
// 👉 EMPLOYEE CERT TEMPLATE
// ===============================

/* NAME */
document.getElementById("empCertStudentName").textContent =
user.fullName ||
((user.firstName || "") + " " + (user.lastName || "")).trim() ||
user.email ||
"User";

/* DATE */
document.getElementById("empCertCompletionDate").textContent =
new Date(Number(storedDate)).toLocaleDateString("en-US");

/* CERT ID */
document.getElementById("empCertCertificateId").textContent =
"Certificate ID: " + certId;

/* QR (TEMPLATE) */
const qrTemplate = document.getElementById("empCertQR");
qrTemplate.innerHTML = "";

new QRCode(qrTemplate,{
text: verifyUrl,
width:90,
height:90
});

}

});
</script>

<!-- SECOND SCRIPT (BUTTONS / TABS) -->
<script>

function returnToDashboard(){
  window.location.href = "dashboard.html";
}

function showCert(type){

// hide all
document.getElementById("employeeCertTemplate").classList.add("hidden");
document.getElementById("supervisorCertTemplate").classList.add("hidden");
document.getElementById("derCertTemplate").classList.add("hidden");

// show selected
if(type === "employee"){
  document.getElementById("employeeCertTemplate").classList.remove("hidden");
}

if(type === "supervisor"){
  document.getElementById("supervisorCertTemplate").classList.remove("hidden");
}

if(type === "der"){
  document.getElementById("derCertTemplate").classList.remove("hidden");
}

}

function printCert(){

  const cert = document.querySelector(
    "#employeeCertTemplate:not(.hidden), #supervisorCertTemplate:not(.hidden), #derCertTemplate:not(.hidden)"
  );

  if(!cert){
    alert("No certificate found.");
    return;
  }

  document.body.classList.add("print-mode");

  setTimeout(() => {
    window.print();
    document.body.classList.remove("print-mode");
  }, 100);
}  
  
</script>
