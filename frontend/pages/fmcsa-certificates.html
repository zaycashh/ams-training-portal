<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>FMCSA Certificates | AMS Training Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f6f2;--color-surface:#faf9f7;--color-surface-2:#ffffff;
      --color-surface-offset:#f0ede8;--color-divider:#e2dfd9;--color-border:#d6d3cc;
      --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
      --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-surface:#e6f2f2;
      --color-danger:#c0392b;--color-danger-surface:#fdecea;
      --radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
      --shadow-card:0 1px 3px oklch(0.2 0.01 80/.06),0 4px 14px oklch(0.2 0.01 80/.07);
      --shadow-lg:0 12px 36px oklch(0.2 0.01 80/.12);
      --transition:180ms cubic-bezier(0.16,1,0.3,1);
      --font-body:'DM Sans','Helvetica Neue',sans-serif;--font-ui:'Inter',sans-serif;
      --space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-12:3rem;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
    }
    [data-theme="dark"] {
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#222120;
      --color-surface-offset:#252422;--color-divider:#2e2d2b;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-primary:#4f98a3;--color-primary-hover:#3a8490;--color-primary-surface:#1c3436;
      --color-danger:#e05c4b;--color-danger-surface:#2e1a18;
      --shadow-card:0 1px 3px oklch(0 0 0/.3),0 4px 14px oklch(0 0 0/.25);
      --shadow-lg:0 12px 36px oklch(0 0 0/.4);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);min-height:100dvh;display:flex;flex-direction:column;}
    button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-8);background:var(--color-surface);border-bottom:1px solid var(--color-divider);position:sticky;top:0;z-index:50;}
    .topbar-brand{display:flex;align-items:center;gap:var(--space-3);}
    .logo-mark{width:34px;height:34px;background:var(--color-primary);border-radius:var(--radius-md);display:grid;place-items:center;flex-shrink:0;}
    .logo-mark svg{color:#fff;}
    .brand-name{font-family:var(--font-ui);font-size:var(--text-sm);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text);}
    .brand-name span{display:block;font-size:var(--text-xs);font-weight:400;letter-spacing:.02em;text-transform:none;color:var(--color-text-muted);}
    .topbar-right{display:flex;align-items:center;gap:var(--space-3);}
    .icon-btn{width:36px;height:36px;border-radius:var(--radius-md);display:grid;place-items:center;color:var(--color-text-muted);transition:background var(--transition),color var(--transition);}
    .icon-btn:hover{background:var(--color-surface-offset);color:var(--color-text);}

    /* PAGE */
    .page{max-width:960px;margin:0 auto;padding:var(--space-8) var(--space-8) var(--space-12);width:100%;}

    /* PAGE HEADER */
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-8);flex-wrap:wrap;gap:var(--space-4);}
    .page-eyebrow{font-family:var(--font-ui);font-size:var(--text-xs);font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .page-title{font-family:var(--font-ui);font-size:var(--text-lg);font-weight:700;color:var(--color-text);}
    .header-actions{display:flex;align-items:center;gap:var(--space-3);}

    /* BUTTONS */
    .btn-primary{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-5);background:var(--color-primary);color:#fff;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;font-family:var(--font-ui);box-shadow:0 1px 3px oklch(0.3 0.08 192/.35);transition:background var(--transition),transform var(--transition);white-space:nowrap;}
    .btn-primary:hover{background:var(--color-primary-hover);}
    .btn-primary:active{transform:translateY(1px);}
    .btn-secondary{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-5);background:var(--color-surface-offset);color:var(--color-text);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;font-family:var(--font-ui);transition:background var(--transition);white-space:nowrap;}
    .btn-secondary:hover{background:var(--color-divider);}
    .btn-print{display:inline-flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-5);background:#1e3a8a;color:#fff;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;font-family:var(--font-ui);transition:background var(--transition);white-space:nowrap;}
    .btn-print:hover{background:#1e3799;}

    /* CERT WRAPPER */
    .cert-wrapper{
      background:var(--color-surface-2);
      border:1px solid var(--color-border);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow-lg);
      overflow:hidden;
      margin-bottom:var(--space-6);
    }

    /* CERT TEMPLATES — structure preserved, just wrapped */
    .cert-template{position:relative;display:none;}
    .cert-template.visible{display:block;}
    .cert-template img{width:100%;display:block;}

    /* HIDDEN */
    .hidden{display:none;}

    /* PRINT MODE — preserved exactly */
    @media print {
      .topbar,.page-header,.btn-print,.btn-secondary,.btn-primary{display:none!important;}
      .cert-wrapper{box-shadow:none;border:none;}
      .cert-template{display:block!important;}
    }
    .print-mode *{visibility:hidden;}
    .print-mode #employeeCertTemplate,
    .print-mode #employeeCertTemplate *,
    .print-mode #supervisorCertTemplate,
    .print-mode #supervisorCertTemplate *,
    .print-mode #derCertTemplate,
    .print-mode #derCertTemplate *{visibility:visible;}
    .print-mode #employeeCertTemplate,
    .print-mode #supervisorCertTemplate,
    .print-mode #derCertTemplate{position:fixed;top:0;left:0;width:100%;}
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="brand-name">AMS<span>Training Portal</span></div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<div class="page">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <p class="page-eyebrow">AMS Training Portal</p>
      <h1 class="page-title">FMCSA Training Certificates</h1>
    </div>
    <div class="header-actions">
      <button class="btn-print" onclick="printCert()">
        <i data-lucide="printer" style="width:14px;height:14px;"></i>
        Print
      </button>
      <button class="btn-secondary" onclick="returnToDashboard()">
        <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
        Return to Dashboard
      </button>
    </div>
  </div>

  <!-- CERT DISPLAY AREA -->
  <div class="cert-wrapper">

    <!-- DER — all IDs and positioning preserved exactly -->
    <div id="derCertTemplate" class="cert-template hidden" style="position:relative;">
      <img src="../assets/certificates/fmcsa-der-template.png" style="width:100%;" />
      <div id="derCertStudentName" style="position:absolute;top:184px;width:100%;text-align:center;font-size:32px;font-weight:bold;"></div>
      <div id="derCertCompletionDate" style="position:absolute;top:306px;left:535px;"></div>
      <div id="derCertCertificateId" style="position:absolute;top:470px;left:350px;font-size:10px;"></div>
      <div id="derCertQR" style="position:absolute;bottom:100px;right:150px;"></div>
      <img src="../assets/certificates/ams-seal.png" style="position:absolute;bottom:90px;left:180px;transform:rotate(-15deg);width:140px;opacity:0.9;z-index:10;">
    </div>

    <!-- EMPLOYEE — all IDs and positioning preserved exactly -->
    <div id="employeeCertTemplate" class="cert-template hidden" style="position:relative;">
      <img src="../assets/certificates/fmcsa-employee-template.png" style="width:100%;" />
      <div id="empCertStudentName" style="position:absolute;top:170px;left:0;width:100%;text-align:center;font-size:30px;font-weight:bold;"></div>
      <div id="empCertCompletionDate" style="position:absolute;top:306px;left:620px;"></div>
      <div id="empCertCertificateId" style="position:absolute;top:455px;left:350px;font-size:10px;"></div>
      <div id="empCertQR" style="position:absolute;bottom:90px;right:150px;"></div>
      <img src="../assets/certificates/ams-seal.png" style="position:absolute;bottom:90px;left:160px;transform:rotate(-15deg);width:140px;opacity:0.9;z-index:10;">
    </div>

    <!-- SUPERVISOR — all IDs and positioning preserved exactly -->
    <div id="supervisorCertTemplate" class="cert-template hidden" style="position:relative;">
      <img src="../assets/certificates/fmcsa-supervisor-template.png" style="width:100%;" />
      <div id="certStudentName" style="position:absolute;top:184px;width:100%;text-align:center;font-size:32px;font-weight:bold;"></div>
      <div id="certCompletionDate" style="position:absolute;top:383px;left:548px;"></div>
      <div id="certCertificateId" style="position:absolute;top:454px;left:350px;font-size:10px;"></div>
      <div id="certQR" style="position:absolute;bottom:90px;left:150px;"></div>
      <img src="../assets/certificates/ams-seal.png" style="position:absolute;bottom:60px;right:125px;transform:rotate(15deg);width:140px;opacity:0.9;z-index:10;">
    </div>

  </div><!-- end cert-wrapper -->

</div><!-- end page -->

<!-- DARK MODE -->
<script>
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  r.setAttribute('data-theme',d);
  function upd(){if(!t)return;t.innerHTML=d==='dark'
    ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';}
  upd();t&&t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);upd();});
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>lucide.createIcons();</script>

<!-- ALL LOGIC — preserved exactly, alert() replaced with inline error display -->
<script>

function returnToDashboard() {
  const user         = JSON.parse(localStorage.getItem("amsUser") || "null");
  const isAdminView  = sessionStorage.getItem("adminViewing") === "true";

  if (isAdminView) {
    sessionStorage.removeItem("adminViewing");
    window.location.href = "company-dashboard.html";
    return;
  }

  if (!user) { window.location.href = "login.html"; return; }

  if (user.role === "company_admin" || user.role === "owner") {
    window.location.href = "company-dashboard.html";
    return;
  }

  window.location.href = "dashboard.html";
}

function showCert(type) {
  ["employeeCertTemplate","supervisorCertTemplate","derCertTemplate"].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.add("hidden"); el.classList.remove("visible"); }
  });

  const map = { employee: "employeeCertTemplate", supervisor: "supervisorCertTemplate", der: "derCertTemplate" };
  const el  = document.getElementById(map[type]);
  if (el) { el.classList.remove("hidden"); el.classList.add("visible"); }
}

function printCert() {
  document.body.classList.add("print-mode");
  setTimeout(() => {
    window.print();
    document.body.classList.remove("print-mode");
  }, 100);
}

function showError(msg) {
  const page = document.querySelector(".page");
  if (!page) return;
  const div = document.createElement("div");
  div.style.cssText = "background:var(--color-danger-surface);color:var(--color-danger);padding:var(--space-5);border-radius:var(--radius-lg);font-weight:600;font-size:var(--text-sm);margin-top:var(--space-4);";
  div.textContent = msg;
  page.appendChild(div);
}

document.addEventListener("DOMContentLoaded", () => {

  const params        = new URLSearchParams(window.location.search);
  const certId        = params.get("id");
  const isCompanyView = params.get("company") === "true";
  const overrideEmail = params.get("email");

  const user    = JSON.parse(localStorage.getItem("amsUser") || "{}");
  const email   = overrideEmail || user?.email;
  const key     = `amsCertificates_${email}`;
  const registry = JSON.parse(localStorage.getItem(key) || "[]");

  let selectedCert = null;

  /* ── COMPANY ADMIN VIEW ── */
  if (isCompanyView) {
    const company = JSON.parse(localStorage.getItem("companyProfile") || "{}");

    if (!company.usedSeats) { showError("No company data found."); return; }

    let companyCerts = [];
    ["employee", "supervisor", "der"].forEach(type => {
      const users = company.usedSeats[type] || {};
      Object.keys(users).forEach(empEmail => {
        const k    = `amsCertificates_${empEmail}`;
        const certs = JSON.parse(localStorage.getItem(k) || "[]");
        certs.forEach(cert => companyCerts.push({ ...cert, email: empEmail }));
      });
    });

    if (!companyCerts.length) { showError("No certificates found for your employees."); return; }

    selectedCert = companyCerts[companyCerts.length - 1];

    if (selectedCert.type === "fmcsa_employee") showCert("employee");
    else if (selectedCert.type === "fmcsa_der") showCert("der");
    else showCert("supervisor");

    const name = selectedCert.name || selectedCert.email;
    const date = new Date(selectedCert.date).toLocaleDateString("en-US");

    if (selectedCert.type === "fmcsa_employee") {
      document.getElementById("empCertStudentName").textContent   = name;
      document.getElementById("empCertCompletionDate").textContent = date;
      document.getElementById("empCertCertificateId").textContent  = "Certificate ID: " + selectedCert.id;
      new QRCode(document.getElementById("empCertQR"), {
        text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
        width: 90, height: 90
      });
    }

    if (selectedCert.type === "fmcsa_der") {
      document.getElementById("derCertStudentName").textContent   = name;
      document.getElementById("derCertCompletionDate").textContent = date;
      document.getElementById("derCertCertificateId").textContent  = "Certificate ID: " + selectedCert.id;
      new QRCode(document.getElementById("derCertQR"), {
        text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
        width: 90, height: 90
      });
    }

    if (selectedCert.type === "fmcsa_supervisor") {
      document.getElementById("certStudentName").textContent   = name;
      document.getElementById("certCompletionDate").textContent = date;
      document.getElementById("certCertificateId").textContent  = "Certificate ID: " + selectedCert.id;
      new QRCode(document.getElementById("certQR"), {
        text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
        width: 110, height: 110,
        colorDark: "#000000", colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    return;
  }

  /* ── NORMAL USER ── */
  selectedCert = registry.find(c => c.id === certId);
  if (!selectedCert) { showError("Certificate not found."); return; }

  if (selectedCert.type === "fmcsa_employee")    showCert("employee");
  else if (selectedCert.type === "fmcsa_der")    showCert("der");
  else                                            showCert("supervisor");

  const name = selectedCert.name || selectedCert.email;
  const date = new Date(selectedCert.date).toLocaleDateString("en-US");

  if (selectedCert.type === "fmcsa_employee") {
    document.getElementById("empCertStudentName").textContent   = name;
    document.getElementById("empCertCompletionDate").textContent = date;
    document.getElementById("empCertCertificateId").textContent  = "Certificate ID: " + selectedCert.id;
    new QRCode(document.getElementById("empCertQR"), { text: window.location.href, width: 90, height: 90 });
  }

  if (selectedCert.type === "fmcsa_der") {
    document.getElementById("derCertStudentName").textContent   = name;
    document.getElementById("derCertCompletionDate").textContent = date;
    document.getElementById("derCertCertificateId").textContent  = "Certificate ID: " + selectedCert.id;
    new QRCode(document.getElementById("derCertQR"), { text: window.location.href, width: 90, height: 90 });
  }

  if (selectedCert.type === "fmcsa_supervisor") {
    document.getElementById("certStudentName").textContent   = name;
    document.getElementById("certCompletionDate").textContent = date;
    document.getElementById("certCertificateId").textContent  = "Certificate ID: " + selectedCert.id;
    new QRCode(document.getElementById("certQR"), {
      text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
      width: 110, height: 110,
      colorDark: "#000000", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  }

});
</script>

</body>
</html>
