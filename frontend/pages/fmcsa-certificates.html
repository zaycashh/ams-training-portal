<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FMCSA Certificates | AMS Training Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../css/main.css" />

<style>
.hidden { display:none; }

.cert-container{
max-width:900px;
margin:auto;
}

.print-mode * {
visibility:hidden;
}

.print-mode #employeeCertTemplate,
.print-mode #employeeCertTemplate *,
.print-mode #supervisorCertTemplate,
.print-mode #supervisorCertTemplate *,
.print-mode #derCertTemplate,
.print-mode #derCertTemplate * {
visibility:visible;
}

.print-mode #employeeCertTemplate,
.print-mode #supervisorCertTemplate,
.print-mode #derCertTemplate {
position:fixed;
top:0;
left:0;
width:100%;
}

.btn-print {
padding:8px 14px;
background:#1e3a8a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<main class="module-container cert-container">

<header class="module-header">
<h1>FMCSA Training Certificates</h1>

<button class="btn-print" onclick="printCert()">🖨 Print</button>

<button onclick="returnToDashboard()">Return to Dashboard</button>
</header>

<!-- DER -->
<div id="derCertTemplate" class="hidden" style="position:relative;">

  <!-- ✅ BACKGROUND INSIDE -->
  <img src="../assets/certificates/fmcsa-der-template.png" style="width:100%;" />

  <div id="derCertStudentName" style="position:absolute;top:184px;width:100%;text-align:center;font-size:32px;font-weight:bold;"></div>

  <div id="derCertCompletionDate" style="position:absolute;top:306px;left:535px;"></div>

  <div id="derCertCertificateId" style="position:absolute;top:470px;left:350px;font-size:10px;"></div>

  <div id="derCertQR" style="position:absolute;bottom:100px;right:150px;"></div>

  <!-- ✅ SEAL -->
  <img src="../assets/certificates/ams-seal.png"
     style="
       position:absolute;
       bottom:90px;
       left:180px;
       transform:rotate(-15deg);
       width:140px;
       opacity:0.9;
       z-index:10;
     ">

</div>

<!-- EMPLOYEE -->
<div id="employeeCertTemplate" class="hidden" style="position:relative;">

  <img src="../assets/certificates/fmcsa-employee-template.png" style="width:100%;" />

  <div id="empCertStudentName" style="position:absolute;top:170px;left:50%;transform:translateX(-50%);font-size:30px;font-weight:bold;"></div>

  <div id="empCertCompletionDate" style="position:absolute;top:292px;left:539px;"></div>

  <div id="empCertCertificateId" style="position:absolute;top:455px;left:350px;font-size:10px;"></div>

  <div id="empCertQR" style="position:absolute;bottom:90px;right:150px;"></div>

  <img src="../assets/certificates/ams-seal.png"
     style="
       position:absolute;
       bottom:90px;
       left:160px;
       transform:rotate(-15deg);
       width:140px;
       opacity:0.9;
       z-index:10;
     ">

</div>

<!-- SUPERVISOR -->
<div id="supervisorCertTemplate" class="hidden" style="position:relative;">
<img src="../assets/certificates/fmcsa-supervisor-template.png" style="width:100%;" />

<div id="certStudentName" style="position:absolute;top:184px;width:100%;text-align:center;font-size:32px;font-weight:bold;"></div>

<div id="certCompletionDate" style="position:absolute;top:383px;left:548px;"></div>

<div id="certCertificateId" style="position:absolute;top:454px;left:350px;font-size:10px;"></div>

<div id="certQR" style="position:absolute;bottom:90px;left:150px;"></div>
  
<img src="../assets/certificates/ams-seal.png"
     style="
       position:absolute;
       bottom:60px;
       right:125px;
       transform:rotate(15deg);
       width:140px;
       opacity:0.9;
       z-index:10;
     ">
</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

function returnToDashboard(){

  const user =
    JSON.parse(localStorage.getItem("amsUser") || "null");

  const isAdminView =
    sessionStorage.getItem("adminViewing") === "true";

  /* =========================
     ADMIN VIEW (FROM COMPANY DASHBOARD)
  ========================= */

  if (isAdminView) {
    sessionStorage.removeItem("adminViewing");
    window.location.href = "company-dashboard.html";
    return;
  }

  /* =========================
     NORMAL USER
  ========================= */

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  if (user.role === "company_admin" || user.role === "owner") {
    window.location.href = "company-dashboard.html";
    return;
  }

  window.location.href = "dashboard.html";
}

function showCert(type){
  document.getElementById("employeeCertTemplate").classList.add("hidden");
  document.getElementById("supervisorCertTemplate").classList.add("hidden");
  document.getElementById("derCertTemplate").classList.add("hidden");

  if(type === "employee") document.getElementById("employeeCertTemplate").classList.remove("hidden");
  if(type === "supervisor") document.getElementById("supervisorCertTemplate").classList.remove("hidden");
  if(type === "der") document.getElementById("derCertTemplate").classList.remove("hidden");
}

function printCert(){
  document.body.classList.add("print-mode");
  setTimeout(() => {
    window.print();
    document.body.classList.remove("print-mode");
  }, 100);
}

document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const certId = params.get("id");
  const isCompanyView = params.get("company") === "true";
  const overrideEmail = params.get("email");

  const user = JSON.parse(localStorage.getItem("amsUser") || "{}");
  const email = overrideEmail || user?.email;

  const key = `amsCertificates_${email}`;
  const registry = JSON.parse(localStorage.getItem(key) || "[]");

  let selectedCert = null;

/* =========================
   COMPANY ADMIN VIEW
========================= */
if (isCompanyView) {

  const company =
    JSON.parse(localStorage.getItem("companyProfile") || "{}");

  if (!company.usedSeats) {
    alert("No company data found");
    return;
  }

  let companyCerts = [];

  ["employee", "supervisor", "der"].forEach(type => {

    const users = company.usedSeats[type] || {};

    Object.keys(users).forEach(empEmail => {

      const key = `amsCertificates_${empEmail}`;
      const certs = JSON.parse(localStorage.getItem(key) || "[]");

      certs.forEach(cert => {
        companyCerts.push({ ...cert, email: empEmail });
      });

    });

  });

  if (!companyCerts.length) {
    alert("No certificates found for your employees");
    return;
  }

  // ✅ Pick latest employee certificate
  selectedCert = companyCerts[companyCerts.length - 1];

  /* =========================
     RENDER CERT
  ========================= */

  if (selectedCert.type === "fmcsa_employee") showCert("employee");
  else if (selectedCert.type === "fmcsa_der") showCert("der");
  else showCert("supervisor");

  const userData =
  JSON.parse(localStorage.getItem("amsUser") || "{}");

const name =
  userData.fullName ||
  `${userData.firstName || ""} ${userData.lastName || ""}`.trim() ||
  selectedCert.name ||
  selectedCert.email;
  const date = new Date(selectedCert.date).toLocaleDateString("en-US");
    
   if (selectedCert.type === "fmcsa_employee") {
  empCertStudentName.textContent = name;
  empCertCompletionDate.textContent = date;
  empCertCertificateId.textContent = "Certificate ID: " + selectedCert.id;

  new QRCode(empCertQR, {
    text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
    width: 90,
    height: 90
  });
}
    
  if (selectedCert.type === "fmcsa_der") {
  derCertStudentName.textContent = name;
  derCertCompletionDate.textContent = date;
  derCertCertificateId.textContent = "Certificate ID: " + selectedCert.id;

  new QRCode(derCertQR, {
    text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
    width: 90,
    height: 90
  });
}

  if (selectedCert.type === "fmcsa_supervisor") {
  certStudentName.textContent = name;
  certCompletionDate.textContent = date;
  certCertificateId.textContent = "Certificate ID: " + selectedCert.id;

  new QRCode(certQR, {
  text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
  width: 110,
  height: 110,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
    
}

  return;
}

/* =========================
   NORMAL USER FALLBACK
========================= */
if (!selectedCert) {

  selectedCert = registry.find(c => c.id === certId);

  if (!selectedCert) {
    alert("Certificate not found");
    return;
  }

}

  if (selectedCert.type === "fmcsa_employee") showCert("employee");
  else if (selectedCert.type === "fmcsa_der") showCert("der");
  else showCert("supervisor");

  const name =
  user.fullName ||
  `${user.firstName || ""} ${user.lastName || ""}`.trim() ||
  selectedCert.name ||
  user.email;

  const date = new Date(selectedCert.date).toLocaleDateString("en-US");

  if (selectedCert.type === "fmcsa_employee") {
    empCertStudentName.textContent = name;
    empCertCompletionDate.textContent = date;
    empCertCertificateId.textContent = "Certificate ID: " + selectedCert.id;

    new QRCode(empCertQR, { text: window.location.href, width:90, height:90 });
  }

  if (selectedCert.type === "fmcsa_der") {
    derCertStudentName.textContent = name;
    derCertCompletionDate.textContent = date;
    derCertCertificateId.textContent = "Certificate ID: " + selectedCert.id;

    new QRCode(derCertQR, { text: window.location.href, width:90, height:90 });
  }

  if (selectedCert.type === "fmcsa_supervisor") {
    certStudentName.textContent = name;
    certCompletionDate.textContent = date;
    certCertificateId.textContent = "Certificate ID: " + selectedCert.id;

    new QRCode(certQR, {
  text: `${window.location.origin}/ams-training-portal/frontend/pages/verify.html?id=${selectedCert.id}`,
  width: 110,
  height: 110,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
  }

});

</script>

</body>
</html>
