<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>FMCSA Training Certificates | AMS Training Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#faf9f7;--color-surface-2:#ffffff;
      --color-surface-offset:#f0ede8;--color-divider:#e2dfd9;--color-border:#d6d3cc;
      --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
      --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-surface:#e6f2f2;
      --color-warning:#964219;--color-warning-surface:#fdf0e8;
      --radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
      --shadow-card:0 1px 3px oklch(0.2 0.01 80/.06),0 4px 14px oklch(0.2 0.01 80/.07);
      --shadow-lg:0 8px 30px oklch(0.2 0.01 80/.12);
      --transition:180ms cubic-bezier(0.16,1,0.3,1);
      --font-body:'DM Sans','Helvetica Neue',sans-serif;
      --font-ui:'Inter',sans-serif;
      --font-cert:'IM Fell English',Georgia,serif;
      --font-title:'Cinzel',Georgia,serif;
    }
    [data-theme="dark"]{
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#222120;
      --color-surface-offset:#252422;--color-divider:#2e2d2b;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-primary:#4f98a3;--color-primary-hover:#3a8490;--color-primary-surface:#1c3436;
      --shadow-card:0 1px 3px oklch(0 0 0/.3),0 4px 14px oklch(0 0 0/.25);
      --shadow-lg:0 8px 30px oklch(0 0 0/.4);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{font-family:var(--font-body);color:var(--color-text);background:var(--color-bg);min-height:100dvh;display:flex;flex-direction:column;}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 2rem;background:var(--color-surface);border-bottom:1px solid var(--color-divider);position:sticky;top:0;z-index:40;}
    .topbar-left{display:flex;align-items:center;gap:1rem;}
    .topbar-brand{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
    .topbar-logo{width:30px;height:30px;background:var(--color-primary);border-radius:var(--radius-md);display:grid;place-items:center;flex-shrink:0;}
    .topbar-logo svg{color:#fff;}
    .topbar-name{font-family:var(--font-ui);font-size:.8125rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text);}
    .topbar-name span{display:block;font-size:.7rem;font-weight:400;letter-spacing:.02em;text-transform:none;color:var(--color-text-muted);}
    .topbar-right{display:flex;align-items:center;gap:.75rem;}
    .icon-btn{width:36px;height:36px;border-radius:var(--radius-md);display:grid;place-items:center;color:var(--color-text-muted);background:none;border:none;cursor:pointer;transition:background var(--transition),color var(--transition);}
    .icon-btn:hover{background:var(--color-surface-offset);color:var(--color-text);}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.25rem;border-radius:var(--radius-md);font-size:.875rem;font-weight:600;font-family:var(--font-ui);cursor:pointer;border:none;transition:background var(--transition);}
    .btn-primary{background:var(--color-primary);color:#fff;}
    .btn-primary:hover{background:var(--color-primary-hover);}
    .btn-secondary{background:var(--color-surface-offset);color:var(--color-text);border:1px solid var(--color-border);}
    .btn-secondary:hover{background:var(--color-divider);}

    /* PAGE */
    .page{flex:1;padding:2.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:2rem;}

    /* PAGE HEADER */
    .page-header{width:100%;max-width:900px;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
    .page-header-text{}
    .page-eyebrow{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-faint);margin-bottom:.25rem;}
    .page-title{font-size:1.625rem;font-weight:700;font-family:var(--font-ui);color:var(--color-text);}
    .page-actions{display:flex;gap:.625rem;flex-shrink:0;}

    /* ERROR */
    .error-card{width:100%;max-width:500px;background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:2rem;text-align:center;box-shadow:var(--shadow-card);}
    .error-card h3{font-size:1.1rem;font-weight:700;margin-bottom:.5rem;}
    .error-card p{font-size:.9rem;color:var(--color-text-muted);}

    /* =============================================
       CERTIFICATE WRAPPER
    ============================================= */
    .cert-outer{
      width:100%;
      max-width:900px;
      background:#fff;
      color:#1a1a1a;
      /* Blue decorative double border */
      border:18px solid #1a3a8f;
      outline:4px solid #1a3a8f;
      outline-offset:-22px;
      box-shadow:
        0 0 0 2px #2952c8,
        inset 0 0 0 2px #2952c8,
        var(--shadow-lg);
      border-radius:4px;
      position:relative;
      padding:48px 64px 40px;
      display:none; /* hidden until JS shows it */
    }
    .cert-outer.visible{display:block;}

    /* Corner ornaments */
    .cert-outer::before,.cert-outer::after{
      content:"✦";
      position:absolute;
      font-size:22px;
      color:#1a3a8f;
      line-height:1;
    }
    .cert-outer::before{top:8px;left:12px;}
    .cert-outer::after{top:8px;right:12px;}
    .cert-corner-bl,.cert-corner-br{
      position:absolute;
      font-size:22px;
      color:#1a3a8f;
      line-height:1;
    }
    .cert-corner-bl{bottom:8px;left:12px;}
    .cert-corner-br{bottom:8px;right:12px;}

    /* CERT CONTENT */
    .cert-body{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:0;
    }

    .cert-main-title{
      font-family:var(--font-title);
      font-size:2.6rem;
      font-weight:600;
      color:#1a1a1a;
      letter-spacing:.02em;
      line-height:1.2;
      margin-bottom:1rem;
    }

    .cert-subtitle{
      font-family:var(--font-cert);
      font-size:1.15rem;
      color:#333;
      margin-bottom:1.25rem;
      font-style:italic;
    }

    .cert-name{
      font-family:var(--font-cert);
      font-size:2rem;
      font-weight:700;
      color:#1a1a1a;
      letter-spacing:.03em;
      border-bottom:1.5px solid #1a3a8f;
      padding-bottom:.375rem;
      min-width:320px;
      margin-bottom:1.25rem;
    }

    .cert-completed-line{
      font-family:var(--font-cert);
      font-size:1.05rem;
      color:#444;
      font-style:italic;
      margin-bottom:.75rem;
    }

    .cert-course-name{
      font-family:var(--font-cert);
      font-size:1.35rem;
      font-weight:700;
      color:#1a1a1a;
      margin-bottom:.5rem;
      line-height:1.4;
    }

    .cert-regulation{
      font-family:var(--font-cert);
      font-size:.95rem;
      color:#555;
      font-style:italic;
      margin-bottom:.5rem;
    }

    .cert-modules{
      font-family:var(--font-cert);
      font-size:.95rem;
      font-weight:700;
      font-style:italic;
      color:#1a1a1a;
      line-height:1.7;
      margin-bottom:.5rem;
    }

    .cert-awarded{
      font-family:var(--font-cert);
      font-size:1.05rem;
      color:#444;
      font-style:italic;
      margin-top:.75rem;
      margin-bottom:2rem;
    }
    .cert-awarded span{
      font-weight:700;
      font-style:normal;
      color:#1a1a1a;
    }

    /* BOTTOM ROW — seal left, cert ID center, QR right */
    .cert-bottom{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      width:100%;
      margin-top:.5rem;
      gap:1rem;
    }
    .cert-seal{
      width:120px;
      height:120px;
      flex-shrink:0;
      opacity:.95;
    }
    .cert-seal img{
      width:100%;
      height:100%;
      object-fit:contain;
      transform:rotate(-15deg);
    }
    .cert-id-wrap{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      gap:.25rem;
      padding-bottom:.25rem;
    }
    .cert-id{
      font-family:var(--font-ui);
      font-size:.72rem;
      color:#888;
      letter-spacing:.04em;
    }
    .cert-qr{
      width:100px;
      height:100px;
      flex-shrink:0;
    }
    .cert-qr canvas,
    .cert-qr img{
      width:100% !important;
      height:100% !important;
    }

    /* TOAST */
    .ams-toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:.875rem 1.25rem;font-size:.9rem;font-weight:500;box-shadow:var(--shadow-lg);z-index:9999;display:flex;align-items:center;gap:.625rem;max-width:340px;animation:toastIn 220ms cubic-bezier(0.16,1,0.3,1);}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .toast-error{border-left:3px solid var(--color-warning);color:var(--color-warning);}
    .toast-info{border-left:3px solid var(--color-primary);color:var(--color-primary);}

    /* PRINT */
    @media print {
      body{background:#fff;}
      .topbar,.page-header,.no-print{display:none!important;}
      .page{padding:0;}
      .cert-outer{
        display:block!important;
        max-width:100%;
        box-shadow:none;
        margin:0;
        page-break-inside:avoid;
      }
    }

    @media(max-width:768px){
      .cert-outer{padding:32px 28px 28px;border-width:12px;}
      .cert-main-title{font-size:1.8rem;}
      .cert-name{font-size:1.4rem;min-width:200px;}
      .cert-course-name{font-size:1.1rem;}
      .cert-seal{width:80px;height:80px;}
      .cert-qr{width:75px;height:75px;}
      .page-header{flex-direction:column;}
      .topbar{padding:.875rem 1r
