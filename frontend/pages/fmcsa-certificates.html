<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FMCSA Certificates | AMS Training Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../css/main.css" />

<style>
.cert-container{
max-width:900px;
margin:auto;
}

.cert-card{
background:#f9fafc;
border:1px solid #dce3ef;
border-radius:8px;
padding:20px;
margin-bottom:20px;
}

.cert-card h2{
margin-top:0;
}

.cert-title{
font-size:20px;
font-weight:600;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<script>
(function(){

const user = JSON.parse(localStorage.getItem("amsUser") || "null");

if(!user){
window.location.replace("login.html");
return;
}

/* BLOCK EMPLOYEES */
if(user.role === "employee"){
alert("Unauthorized access.");
window.location.replace("dashboard.html");
return;
}

/* CHECK PURCHASE ACCESS */

const supervisorPurchased =
localStorage.getItem("paid_fmcsa") === "true";

const derPurchased =
localStorage.getItem("paid_der_fmcsa") === "true";

if(!supervisorPurchased && !derPurchased){
alert("FMCSA Training requires purchase.");
window.location.replace("dashboard.html");
return;
}

/* OPTIONAL 30 DAY EXPIRATION */

const start = localStorage.getItem("fmcsa_start_date");

if(start){

const DAY_MS = 86400000;
const LIMIT_DAYS = 30;

const elapsed = Date.now() - Number(start);
const daysUsed = Math.floor(elapsed / DAY_MS);

if(daysUsed >= LIMIT_DAYS){

alert("FMCSA training window expired. Repurchase required.");
window.location.replace("dashboard.html");
return;

}

}

})();
</script>

<main class="module-container cert-container">

<header class="module-header">
<h1>FMCSA Training Certificates</h1>

<button class="btn-secondary" onclick="returnToDashboard()">
Return to Dashboard
</button>

</header>
  
  <!-- MODULE A CERT -->
<section id="moduleACert" class="cert-card hidden">

<h2 class="cert-title">🎓 FMCSA Reasonable Suspicion Training</h2>

<p><strong>Name:</strong> <span id="aName"></span></p>
<p><strong>Date Completed:</strong> <span id="aDate"></span></p>
<p><strong>Certificate ID:</strong> <span id="aCertId"></span></p>

<div id="aQR" style="margin-top:10px;"></div>

</section>

<!-- MODULE B CERT -->
<section id="moduleBCert" class="cert-card hidden">

<h2 class="cert-title">🎓 FMCSA Drug & Alcohol Substance Abuse Training</h2>

<p><strong>Name:</strong> <span id="bName"></span></p>
<p><strong>Date Completed:</strong> <span id="bDate"></span></p>
<p><strong>Certificate ID:</strong> <span id="bCertId"></span></p>

<div id="bQR" style="margin-top:10px;"></div>  

</section>


<!-- DER CERT -->
<section id="derCert" class="cert-card hidden">

<h2 class="cert-title">🎓 FMCSA DER Training</h2>

<p><strong>Name:</strong> <span id="derName"></span></p>
<p><strong>Date Completed:</strong> <span id="derDate"></span></p>
<p><strong>Certificate ID:</strong> <span id="derCertId"></span></p>

<div id="derQR" style="margin-top:10px;"></div>  

</section>

</main>


<script>

/* ===================================
LOAD CERTIFICATES
=================================== */

document.addEventListener("DOMContentLoaded",()=>{

const user = JSON.parse(localStorage.getItem("amsUser") || "{}");

const modACompleted =
localStorage.getItem("fmcsaModuleACompleted") === "true";

const modBCompleted =
localStorage.getItem("fmcsaModuleBCompleted") === "true";

const derCompleted =
localStorage.getItem("fmcsaDERCompleted") === "true";

/* IF NOTHING COMPLETED RETURN */

if(!modACompleted && !modBCompleted && !derCompleted){

window.location.replace("dashboard.html");
return;

}


/* MODULE A */

if(modACompleted){

document.getElementById("moduleACert").classList.remove("hidden");

document.getElementById("aName").textContent =
user.fullName || 
((user.firstName || "") + " " + (user.lastName || "")).trim() || 
user.email || 
"User";

const storedADate =
localStorage.getItem("fmcsaModuleADate");

document.getElementById("aDate").textContent =
storedADate
? new Date(Number(storedADate)).toLocaleDateString()
: "N/A";

const certIdA =
localStorage.getItem("fmcsaModuleACertificateId");

document.getElementById("aCertId").textContent =
certIdA || "N/A";

if(certIdA && typeof QRCode !== "undefined"){

const verifyUrl =
window.location.origin +
"/ams-training-portal/frontend/pages/verify.html?id=" +
certIdA;

new QRCode(document.getElementById("aQR"),{
text: verifyUrl,
width:128,
height:128
});

}

}  

/* MODULE B */

if(modBCompleted){

document.getElementById("moduleBCert").classList.remove("hidden");

document.getElementById("bName").textContent =
user.fullName || 
((user.firstName || "") + " " + (user.lastName || "")).trim() || 
user.email || 
"User";

const storedBDate =
localStorage.getItem("fmcsaModuleBDate");

document.getElementById("bDate").textContent =
storedBDate
? new Date(Number(storedBDate)).toLocaleDateString()
: new Date().toLocaleDateString();

document.getElementById("bCertId").textContent =
localStorage.getItem("fmcsaModuleBCertificateId") || "N/A";

}


/* DER CERTIFICATE */

if(derCompleted){

document.getElementById("derCert").classList.remove("hidden");

document.getElementById("derName").textContent =
user.fullName || 
((user.firstName || "") + " " + (user.lastName || "")).trim() || 
user.email || 
"User";

const storedDate =
localStorage.getItem("fmcsaDERDate");

document.getElementById("derDate").textContent =
storedDate
? new Date(Number(storedDate)).toLocaleDateString()
: "N/A";

document.getElementById("derCertId").textContent =
localStorage.getItem("fmcsaDERCertificateId") || "N/A";

}

});


/* RETURN BUTTON */

function returnToDashboard(){
window.location.href="dashboard.html";
}

</script>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
