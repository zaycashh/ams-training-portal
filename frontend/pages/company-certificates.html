<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Company Certificates | AMS Training Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../css/main.css" />
</head>

<body>

<header class="portal-header">
  <div class="header-inner">
    <h1>Company Certificates</h1>
    <div class="module-controls">
      <button class="btn-secondary" onclick="goDashboard()">
        Return to Dashboard
      </button>
    </div>
  </div>
</header>

<main class="dashboard-container">

  <div class="cert-admin-container">

<h2>Employee Certificates</h2>

<table class="cert-table">
  <thead>
    <tr>
      <th>Employee</th>
      <th>Course</th>
      <th>Date Completed</th>
      <th>Certificate</th>
    </tr>
  </thead>

  <tbody id="certTableBody"></tbody>
</table>

  </div>

</main>

<script src="../js/certificate-engine.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const user = JSON.parse(localStorage.getItem("amsUser") || "null");
  if (!user) {
    window.location.replace("login.html");
    return;
  }

  const tbody = document.getElementById("certTableBody");
  if (!tbody) return;

  const company =
    JSON.parse(localStorage.getItem("companyProfile") || "{}");

  const program = company.program || "FAA"; // 🔥 LOCKED PROGRAM

  const allSeats = company.usedSeats || {};

const emails = new Set();

["employee", "supervisor", "der"].forEach(type => {
  Object.keys(allSeats[type] || {}).forEach(email => {
    emails.add(email);
  });
});

  let hasData = false;

  emails.forEach(email => {

    const key = `amsCertificates_${email}`;
    const certs = JSON.parse(localStorage.getItem(key) || "[]");

    certs
  .filter(cert => {

    // 🔥 ONLY SHOW FINAL SUPERVISOR CERT
    if (cert.type === "fmcsa_supervisor") return true;

    // 🔥 SHOW EMPLOYEE / DER NORMAL
    if (cert.type === "fmcsa_employee") return true;
    if (cert.type === "fmcsa_der") return true;

    // 🔥 FAA (if needed)
    if (cert.type === "faa_employee") return true;
    if (cert.type === "faa_supervisor") return true;
    if (cert.type === "faa_der") return true;

    return false;

  })
  .forEach(cert => {

      /* =========================
         🔥 PROGRAM FILTER (IMPORTANT)
      ========================= */

      if (program === "FMCSA" && !cert.type?.startsWith("fmcsa")) return;
      if (program === "FAA" && !cert.type?.startsWith("faa")) return;

      hasData = true;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${email}</td>
        <td>${formatCourse(cert)}</td>
        <td>${formatDate(cert)}</td>
        <td>
          <button class="btn-primary" onclick="viewCert('${cert.id}', '${email}')">
            View
          </button>
        </td>
      `;

      tbody.appendChild(tr);

    });

  });

  if (!hasData) {
    tbody.innerHTML = `
      <tr>
        <td colspan="4" style="text-align:center;">
          No certificates found for this program.
        </td>
      </tr>
    `;
  }

});

/* =========================
   FORMAT COURSE NAME
========================= */

function formatCourse(cert) {

  const map = {
    fmcsa_supervisor: "FMCSA Supervisor Training",
    fmcsa_employee: "FMCSA Employee Training",
    fmcsa_der: "FMCSA DER Training",
    faa_supervisor: "FAA Supervisor Training",
    faa_employee: "FAA Employee Training",
    faa_der: "FAA DER Training"
  };

  return map[cert.type] || cert.course || "Training";
}

/* =========================
   FORMAT DATE (SAFE)
========================= */

function formatDate(cert) {
  if (cert.displayDate) return cert.displayDate;

  if (cert.date) {
    return new Date(cert.date).toLocaleDateString("en-US");
  }

  return "—";
}

/* =========================
   VIEW CERTIFICATE
========================= */

function viewCert(id, email){

  const key = `amsCertificates_${email}`;
  const certs = JSON.parse(localStorage.getItem(key) || "[]");

  const cert = certs.find(c => c.id === id);

  if(!cert){
    alert("Certificate not found");
    return;
  }

  if(cert.type?.startsWith("fmcsa")){
    window.location.href = "fmcsa-certificates.html?id=" + id;
  } else {
    window.location.href = "faa-certificates.html?id=" + id;
  }

}

/* =========================
   NAVIGATION
========================= */

function goDashboard(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
