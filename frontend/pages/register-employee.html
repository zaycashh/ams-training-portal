<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Employee Account | AMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/ams-training-portal/frontend/css/main.css" />
</head>

<body>

<main class="auth-container">
  <div class="auth-card">

    <div class="back-link">
      <a href="register-select.html">← Back to Registration Options</a>
    </div>

    <h2>Create Employee Account</h2>
    <p>This account requires a valid company invite code.</p>

    <form id="employeeRegisterForm" class="auth-form">

      <div class="form-row">
        <label>First Name</label>
        <input type="text" id="firstName" required />
      </div>

      <div class="form-row">
        <label>Last Name</label>
        <input type="text" id="lastName" required />
      </div>

      <div class="form-row">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="(123) 456-7890" required />
      </div>

      <div class="form-row">
        <label>Email Address</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-row">
        <label>Password</label>
        <input type="password" id="password" required />
      </div>

      <div class="form-row">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" required />
      </div>

      <div class="form-row">
        <label>Invite Code</label>
        <input type="text" id="inviteCode" required />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">
          Create Employee Account
        </button>
      </div>

      <p style="margin-top:14px; text-align:center;">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

      <p id="msg" style="margin-top:10px;"></p>

    </form>

  </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("employeeRegisterForm");

  form.addEventListener("submit", function (e) {

    e.preventDefault();

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const inviteCode = document.getElementById("inviteCode").value.trim();

    const msg = document.getElementById("msg");

    if (!firstName || !lastName || !phone || !email || !password || !confirmPassword || !inviteCode) {
      msg.textContent = "Please complete all fields.";
      return;
    }

    if (password.length < 6) {
      msg.textContent = "Password must be at least 6 characters.";
      return;
    }

    if (password !== confirmPassword) {
      msg.textContent = "Passwords do not match.";
      return;
    }

    const companyProfile = JSON.parse(localStorage.getItem("companyProfile") || "null");

    if (!companyProfile || !companyProfile.invites || !companyProfile.invites[inviteCode]) {
      msg.textContent = "Invalid or expired invite code.";
      return;
    }

    const users = JSON.parse(localStorage.getItem("ams_users") || "[]");

    if (users.find(u => u.email === email)) {
      msg.textContent = "An account with this email already exists.";
      return;
    }

    const program =
      new URLSearchParams(window.location.search).get("program") || "faa";

    const user = {
      id: "emp-" + email,
      firstName,
      lastName,
      phone,
      email,
      password,
      role: "employee",
      type: "company",
      program,
      companyId: companyProfile.id,
      createdAt: Date.now()
    };

    users.push(user);
    localStorage.setItem("ams_users", JSON.stringify(users));

    // 🔥 Assign seat
    companyProfile.usedSeats[email] = true;
    delete companyProfile.invites[inviteCode];

    localStorage.setItem("companyProfile", JSON.stringify(companyProfile));

    localStorage.setItem("amsUser", JSON.stringify(user));
    localStorage.setItem("amsProgram", program);

    window.location.href = "dashboard.html";

  });

});
</script>

</body>
</html>

<script src="../js/register-employee.js"></script>

</body>
</html>
