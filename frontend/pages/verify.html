<script>

function verifyCert(){

const certId = document.getElementById("certInput").value.trim();
const result = document.getElementById("result");

/* CHECK EMPTY */
if(!certId){
result.innerHTML = "Enter a certificate ID.";
return;
}

/* VALIDATE FORMAT */
const certPattern = /^AMS-[EDSB]-\d{8}$/;

if(!certPattern.test(certId)){
result.innerHTML = "Invalid certificate format.";
return;
}

/* CHECK CERTIFICATE REGISTRY */

fetch("/ams-training-portal/data/certificates.json")
.then(res => res.json())
.then(certificates => {

const cert = certificates.find(c => c.id === certId);

if(cert){

let moduleType = "AMS Training Module";

/* FMCSA */

if(cert.id.includes("FMCSA-DER")) moduleType = "FMCSA DER Training";
if(cert.id.includes("FMCSA-SUP")) moduleType = "FMCSA Supervisor Training";
if(cert.id.includes("FMCSA-EMP")) moduleType = "FMCSA Employee Awareness";
if(cert.id.includes("FMCSA-DRUG")) moduleType = "FMCSA Drug & Alcohol Training";

/* FAA */

if(cert.id.includes("FAA-DER")) moduleType = "FAA DER Training";
if(cert.id.includes("FAA-SUP")) moduleType = "FAA Supervisor Training";
if(cert.id.includes("FAA-EMP")) moduleType = "FAA Employee Awareness";

const dateObj = new Date(cert.date);

const formattedDate = dateObj.toLocaleDateString("en-US",{
month:"2-digit",
day:"2-digit",
year:"numeric"
});

result.innerHTML = `
<h3>Certificate Verified ✔</h3>

<p><strong>Name:</strong> ${cert.name}</p>
<p><strong>Course:</strong> ${moduleType}</p>
<p><strong>Date Completed:</strong> ${formattedDate}</p>
<p><strong>Certificate ID:</strong> ${cert.id}</p>
`;

}else{

result.innerHTML = "<h3>Certificate NOT FOUND</h3>";

}

})
.catch(()=>{
result.innerHTML = "Error loading certificate registry";
});

}
<script>

document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const certId = params.get("id");

  if(certId){

    document.getElementById("certInput").value = certId;

    verifyCert();

  }

});

</script>

</body>
</html>
