<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AMS Certificate Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body{
font-family:Arial;
background:#f5f7fb;
padding:40px;
}

.verify-box{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.valid{
color:green;
font-weight:700;
}

.invalid{
color:red;
font-weight:700;
}
</style>
</head>

<body>

<div class="verify-box">

<h2>AMS Certificate Verification</h2>

<p id="status">Checking certificate...</p>

<div id="details"></div>

</div>

<script src="../js/certificate-engine.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const certId = params.get("id");

const status = document.getElementById("status");
const details = document.getElementById("details");

const cert = getCertificate(certId);

if(!cert){

status.innerHTML = "<span class='invalid'>❌ Certificate Not Found</span>";

}else{

status.innerHTML = "<span class='valid'>✔ Certificate Verified</span>";

details.innerHTML = `
<p><strong>Name:</strong> ${cert.name}</p>
<p><strong>Email:</strong> ${cert.email}</p>
<p><strong>Training:</strong> ${cert.module}</p>
<p><strong>Date Completed:</strong> ${new Date(cert.completed).toLocaleDateString()}</p>
<p><strong>Certificate ID:</strong> ${cert.id}</p>
`;

}

</script>

</body>
</html>
