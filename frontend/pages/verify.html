<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AMS Certificate Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
text-align:center;
padding:60px;
}

.verify-container{
max-width:700px;
margin:auto;
}

.verify-card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
margin-top:25px;
}

</style>

</head>

<body>

<div class="verify-container">

<h1>AMS Training Portal</h1>
<h2>Certificate Verification</h2>

<div id="result" class="verify-card">
  <p>🔎 Checking certificate...</p>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const result = document.getElementById("result");

  const params = new URLSearchParams(window.location.search);
  const certId = params.get("id");

  if (!certId) {
    result.innerHTML = "<h2>No certificate ID provided</h2>";
    return;
  }

  let foundCert = null;

  /* 🔥 SEARCH ALL LOCALSTORAGE CERT REGISTRIES */
  for (const key of Object.keys(localStorage)) {

    if (key.startsWith("amsCertificates_")) {

      const registry =
        JSON.parse(localStorage.getItem(key) || "[]");

      const match = registry.find(c => c.id === certId);

      if (match) {
        foundCert = match;
        break;
      }

    }

  }

  /* ✅ MUST BE INSIDE EVENT */
  if (foundCert) {

    const formattedDate =
      foundCert.displayDate ||
      new Date(Number(foundCert.date)).toLocaleDateString("en-US");

    result.innerHTML = `
      <h2 style="color:#0a7d2c;">✔ Certificate Verified</h2>
      <p><strong>Name:</strong> ${foundCert.name}</p>
      <p><strong>Course:</strong> ${foundCert.course}</p>
      <p><strong>Date Completed:</strong> ${formattedDate}</p>
      <p><strong>Certificate ID:</strong> ${foundCert.id}</p>
    `;

  } else {

    result.innerHTML = `
  <h2 style="color:red;">❌ Certificate NOT FOUND</h2>
  <p>This certificate could not be verified on this device.</p>
  <p>Please ensure the certificate was issued by AMS or contact support.</p>
`;

  }

});
</script>

</body>
</html>
