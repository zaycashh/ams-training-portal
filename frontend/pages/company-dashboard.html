<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Company Admin Dashboard | AMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    /* ── DESIGN TOKENS ── */
    :root, [data-theme="light"] {
      --color-bg:               #f7f6f2;
      --color-surface:          #faf9f7;
      --color-surface-2:        #ffffff;
      --color-surface-offset:   #f0ede8;
      --color-divider:          #e2dfd9;
      --color-border:           #d6d3cc;
      --color-text:             #28251d;
      --color-text-muted:       #7a7974;
      --color-text-faint:       #bab9b4;
      --color-primary:          #01696f;
      --color-primary-hover:    #0c4e54;
      --color-primary-surface:  #e6f2f2;
      --color-success:          #437a22;
      --color-success-surface:  #edf5e7;
      --color-warning:          #964219;
      --color-warning-surface:  #fdf0e8;
      --color-blue:             #006494;
      --color-blue-surface:     #e6f0f7;
      --color-purple:           #7a39bb;
      --color-purple-surface:   #f2ecfb;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.25rem;
      --shadow-sm:   0 1px 3px oklch(0.2 0.01 80 / 0.07);
      --shadow-md:   0 4px 14px oklch(0.2 0.01 80 / 0.09);
      --shadow-lg:   0 12px 36px oklch(0.2 0.01 80 / 0.12);
      --shadow-card: 0 1px 3px oklch(0.2 0.01 80 / 0.06), 0 4px 14px oklch(0.2 0.01 80 / 0.07);
      --transition:  180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body:   'DM Sans', 'Helvetica Neue', sans-serif;
      --font-ui:     'Inter', sans-serif;
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --sidebar-w: 240px;
    }
    [data-theme="dark"] {
      --color-bg:               #171614;
      --color-surface:          #1c1b19;
      --color-surface-2:        #222120;
      --color-surface-offset:   #252422;
      --color-divider:          #2e2d2b;
      --color-border:           #393836;
      --color-text:             #cdccca;
      --color-text-muted:       #797876;
      --color-text-faint:       #5a5957;
      --color-primary:          #4f98a3;
      --color-primary-hover:    #3a8490;
      --color-primary-surface:  #1c3436;
      --color-success:          #6daa45;
      --color-success-surface:  #1e2f16;
      --color-warning:          #bb653b;
      --color-warning-surface:  #2e1f15;
      --color-blue:             #5591c7;
      --color-blue-surface:     #1a2b38;
      --color-purple:           #a86fdf;
      --color-purple-surface:   #2a1e3a;
      --shadow-sm:   0 1px 3px oklch(0 0 0 / 0.25);
      --shadow-md:   0 4px 14px oklch(0 0 0 / 0.35);
      --shadow-card: 0 1px 3px oklch(0 0 0 / 0.3), 0 4px 14px oklch(0 0 0 / 0.25);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #222120;
        --color-surface-offset: #252422; --color-divider: #2e2d2b; --color-border: #393836;
        --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
        --color-primary: #4f98a3; --color-primary-hover: #3a8490; --color-primary-surface: #1c3436;
        --color-success: #6daa45; --color-success-surface: #1e2f16;
        --color-warning: #bb653b; --color-warning-surface: #2e1f15;
        --color-blue: #5591c7; --color-blue-surface: #1a2b38;
        --color-purple: #a86fdf; --color-purple-surface: #2a1e3a;
        --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.25); --shadow-md: 0 4px 14px oklch(0 0 0 / 0.35);
        --shadow-card: 0 1px 3px oklch(0 0 0 / 0.3), 0 4px 14px oklch(0 0 0 / 0.25);
      }
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      scroll-behavior: smooth;
    }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text);
      background: var(--color-bg);
      min-height: 100dvh;
      line-height: 1.6;
    }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    input, select, textarea { font: inherit; color: inherit; }
    table { border-collapse: collapse; width: 100%; }

    /* ── LAYOUT ── */
    .layout { display: flex; min-height: 100dvh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--color-surface);
      border-right: 1px solid var(--color-divider);
      display: flex;
      flex-direction: column;
      padding: var(--space-6) 0;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 50;
      transition: transform var(--transition);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-6) var(--space-6);
      border-bottom: 1px solid var(--color-divider);
      margin-bottom: var(--space-4);
    }
    .sidebar-logo-mark {
      width: 32px; height: 32px;
      background: var(--color-primary);
      border-radius: var(--radius-md);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .sidebar-logo-mark svg { color: #fff; }
    .sidebar-brand {
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text);
    }
    .sidebar-brand span {
      display: block;
      font-size: var(--text-xs);
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: none;
      color: var(--color-text-muted);
    }
    .sidebar-nav { flex: 1; padding: 0 var(--space-3); }
    .nav-section-label {
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-faint);
      padding: var(--space-3) var(--space-3) var(--space-2);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-muted);
      text-decoration: none;
      transition: background var(--transition), color var(--transition);
      cursor: pointer;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .nav-item.active {
      background: var(--color-primary-surface);
      color: var(--color-primary);
      font-weight: 600;
    }
    .nav-item i { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer {
      padding: var(--space-4) var(--space-3) var(--space-2);
      border-top: 1px solid var(--color-divider);
    }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      margin-left: var(--sidebar-w);
      min-width: 0;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-8);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-divider);
      position: sticky; top: 0; z-index: 40;
      gap: var(--space-4);
    }
    .topbar-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .topbar-title {
      font-size: var(--text-lg);
      font-weight: 700;
      font-family: var(--font-ui);
      color: var(--color-text);
      line-height: 1.2;
    }
    .topbar-breadcrumb {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .topbar-right { display: flex; align-items: center; gap: var(--space-3); }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      display: grid; place-items: center;
      color: var(--color-text-muted);
      transition: background var(--transition), color var(--transition);
    }
    .icon-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .avatar {
      width: 34px; height: 34px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      color: #fff;
      display: grid; place-items: center;
      font-size: var(--text-xs);
      font-weight: 700;
      font-family: var(--font-ui);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    /* ── PAGE CONTENT ── */
    .page { padding: var(--space-8); max-width: 1140px; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-5);
      gap: var(--space-4);
    }
    .section-title {
      font-size: var(--text-base);
      font-weight: 700;
      font-family: var(--font-ui);
      color: var(--color-text);
    }

    /* ── INFO CARD (Company Overview, Training) ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .info-card {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow-card);
    }
    .info-card-label {
      font-size: var(--text-xs)
