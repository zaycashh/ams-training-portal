<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | AMS Training Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#faf9f7;--color-surface-2:#ffffff;
      --color-surface-offset:#f0ede8;--color-divider:#e2dfd9;--color-border:#d6d3cc;
      --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
      --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-surface:#e6f2f2;
      --color-success:#437a22;--color-success-surface:#edf5e7;
      --color-warning:#964219;--color-warning-surface:#fdf0e8;
      --radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
      --shadow-card:0 1px 3px oklch(0.2 0.01 80/.06),0 4px 14px oklch(0.2 0.01 80/.07);
      --shadow-lg:0 8px 30px oklch(0.2 0.01 80/.12);
      --transition:180ms cubic-bezier(0.16,1,0.3,1);
      --font-body:'DM Sans','Helvetica Neue',sans-serif;
      --font-ui:'Inter',sans-serif;
      --space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;
      --text-xs:.75rem;--text-sm:.875rem;--text-base:.9375rem;--text-lg:1.0625rem;
      --text-xl:1.25rem;--text-2xl:1.5rem;--text-3xl:1.875rem;
    }
    [data-theme="dark"]{
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#222120;
      --color-surface-offset:#252422;--color-divider:#2e2d2b;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-primary:#4f98a3;--color-primary-hover:#3a8490;--color-primary-surface:#1c3436;
      --color-success:#6daa45;--color-success-surface:#1e2f16;
      --color-warning:#bb653b;--color-warning-surface:#2e1f15;
      --shadow-card:0 1px 3px oklch(0 0 0/.3),0 4px 14px oklch(0 0 0/.25);
      --shadow-lg:0 8px 30px oklch(0 0 0/.4);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{font-family:var(--font-body);color:var(--color-text);background:var(--color-bg);min-height:100dvh;display:flex;flex-direction:column;}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 2rem;background:var(--color-surface);border-bottom:1px solid var(--color-divider);}
    .topbar-brand{display:flex;align-items:center;gap:.75rem;text-decoration:none;}
    .topbar-logo{width:30px;height:30px;background:var(--color-primary);border-radius:var(--radius-md);display:grid;place-items:center;}
    .topbar-logo svg{color:#fff;}
    .topbar-name{font-family:var(--font-ui);font-size:.8125rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text);}
    .topbar-name span{display:block;font-size:.7rem;font-weight:400;letter-spacing:.02em;text-transform:none;color:var(--color-text-muted);}
    .icon-btn{width:36px;height:36px;border-radius:var(--radius-md);display:grid;place-items:center;color:var(--color-text-muted);background:none;border:none;cursor:pointer;transition:background var(--transition),color var(--transition);}
    .icon-btn:hover{background:var(--color-surface-offset);color:var(--color-text);}

    /* PAGE */
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 1.5rem;}
    .auth-wrap{width:100%;max-width:420px;display:flex;flex-direction:column;gap:1.5rem;}

    /* ICON HEADER */
    .auth-icon{width:52px;height:52px;background:var(--color-primary-surface);border-radius:var(--radius-xl);display:grid;place-items:center;color:var(--color-primary);margin-bottom:var(--space-2);}
    .auth-eyebrow{font-size:var(--text-xs);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-faint);margin-bottom:var(--space-2);}
    .auth-title{font-size:var(--text-2xl);font-weight:700;font-family:var(--font-ui);color:var(--color-text);margin-bottom:var(--space-2);}
    .auth-subtitle{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.6;}

    /* CARD */
    .card{background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-card);padding:2rem;}

    /* FORM */
    .form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:var(--space-5);}
    .form-label{font-size:var(--text-sm);font-weight:600;font-family:var(--font-ui);color:var(--color-text);}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);color:var(--color-text-faint);pointer-events:none;display:flex;align-items:center;}
    .form-input{width:100%;padding:.75rem .875rem .75rem 2.625rem;border:1.5px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--text-base);font-family:var(--font-body);color:var(--color-text);background:var(--color-surface);transition:border-color var(--transition),box-shadow var(--transition);}
    .form-input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px color-mix(in oklab,var(--color-primary) 15%,transparent);}
    .form-input::placeholder{color:var(--color-text-faint);}

    /* MSG */
    .form-msg{display:none;padding:.75rem 1rem;border-radius:var(--radius-lg);font-size:var(--text-sm);font-weight:500;margin-bottom:var(--space-4);}
    .form-msg.error{display:block;background:var(--color-warning-surface);color:var(--color-warning);border:1px solid color-mix(in oklab,var(--color-warning) 25%,transparent);}
    .form-msg.success{display:block;background:var(--color-success-surface);color:var(--color-success);border:1px solid color-mix(in oklab,var(--color-success) 25%,transparent);}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:var(--radius-md);font-size:var(--text-base);font-weight:600;font-family:var(--font-ui);transition:background var(--transition),box-shadow var(--transition),transform var(--transition);cursor:pointer;border:none;width:100%;}
    .btn:active{transform:translateY(1px);}
    .btn-primary{background:var(--color-primary);color:#fff;box-shadow:0 1px 3px oklch(0.3 0.08 192/.35);}
    .btn-primary:hover:not(:disabled){background:var(--color-primary-hover);}
    .btn-primary:disabled{opacity:.55;cursor:not-allowed;}
    .btn-secondary{background:var(--color-surface-offset);color:var(--color-text);border:1px solid var(--color-border);}
    .btn-secondary:hover{background:var(--color-divider);}
    .btn-actions{display:flex;flex-direction:column;gap:.75rem;}

    /* BACK LINK */
    .back-link{display:flex;align-items:center;justify-content:center;gap:.375rem;font-size:var(--text-sm);color:var(--color-text-muted);text-decoration:none;margin-top:.25rem;transition:color var(--transition);}
    .back-link:hover{color:var(--color-text);}

    /* NOTICE */
    .security-note{display:flex;align-items:flex-start;gap:.625rem;background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:.875rem 1rem;font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.6;}
    .security-note i{color:var(--color-text-faint);flex-shrink:0;margin-top:1px;}
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="topbar-brand" href="login.html">
      <div class="topbar-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="topbar-name">AMS<span>Training Portal</span></div>
    </a>
    <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <!-- PAGE -->
  <div class="page">
    <div class="auth-wrap">

      <!-- HEADER -->
      <div>
        <div class="auth-icon">
          <i data-lucide="key-round" style="width:22px;height:22px;"></i>
        </div>
        <div class="auth-eyebrow">Account Recovery</div>
        <h1 class="auth-title">Forgot your password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link if an account exists.</p>
      </div>

      <!-- CARD -->
      <div class="card">
        <div id="formMsg" class="form-msg"></div>

        <form id="forgotPasswordForm">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon"><i data-lucide="mail" style="width:16px;height:16px;"></i></span>
              <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
            </div>
          </div>

          <div class="btn-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <i data-lucide="send" style="width:15px;height:15px;"></i>
              Send Reset Link
            </button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">
              Back to Login
            </button>
          </div>
        </form>
      </div>

      <!-- SECURITY NOTE -->
      <div class="security-note">
        <i data-lucide="shield" style="width:14px;height:14px;"></i>
        <span>For your security, we always show the same message whether or not the email exists in our system.</span>
      </div>

    </div>
  </div>

  <!-- DARK MODE -->
  <script>
  (function(){
    const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
    let d=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    r.setAttribute('data-theme',d);
    function upd(){if(!t)return;t.innerHTML=d==='dark'
      ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';}
    upd();t&&t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);upd();});
  })();
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script src="../js/forgot-password.js"></script>

</body>
</html>
