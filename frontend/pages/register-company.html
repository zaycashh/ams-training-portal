<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Company Account | AMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Correct GitHub Pages path -->
  <link rel="stylesheet" href="/ams-training-portal/frontend/css/main.css" />
</head>

<body>

<main style="max-width:420px;margin:60px auto;text-align:center;">

  <h2>Create Company Account</h2>

  <form id="companyRegisterForm">

    <input id="firstName" placeholder="First Name" required /><br><br>
    <input id="lastName" placeholder="Last Name" required /><br><br>
    <input id="companyName" placeholder="Company Name" required /><br><br>
    <input id="phone" placeholder="Phone Number" required /><br><br>
    <input id="email" type="email" placeholder="Email" required /><br><br>
    <input id="password" type="password" placeholder="Password" required /><br><br>
    <input id="confirmPassword" type="password" placeholder="Confirm Password" required /><br><br>

    <button type="submit">Create Account</button>

  </form>

</main>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("companyRegisterForm");

  if (!form) {
    alert("Form not found — HTML broken");
    return;
  }

  form.addEventListener("submit", function (e) {

    e.preventDefault();

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const companyName = document.getElementById("companyName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!firstName || !lastName || !companyName || !phone || !email || !password || !confirmPassword) {
      alert("Please complete all fields.");
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters.");
      return;
    }

    if (password !== confirmPassword) {
      alert("Passwords do not match.");
      return;
    }

    const users = JSON.parse(localStorage.getItem("ams_users") || "[]");

    if (users.find(u => u.email === email)) {
      alert("An account with this email already exists.");
      return;
    }

    const companyId = "comp-" + Date.now();

    const companyProfile = {
      id: companyId,
      name: companyName,
      createdAt: Date.now(),
      seats: {
        employee: { total: 5, used: 0 }
      },
      usedSeats: {},
      invites: {},
      modules: [],
      employees: {}
    };

    localStorage.setItem("companyProfile", JSON.stringify(companyProfile));

    const program =
      new URLSearchParams(window.location.search).get("program") || "faa";

    const user = {
      id: "admin-" + email,
      firstName,
      lastName,
      company: companyName,
      phone,
      email,
      password,
      role: "company_admin",
      type: "company",
      companyId,
      program,
      createdAt: Date.now()
    };

    users.push(user);
    localStorage.setItem("ams_users", JSON.stringify(users));

    localStorage.setItem("amsUser", JSON.stringify(user));
    localStorage.setItem("amsProgram", program);

    window.location.href = "company-dashboard.html";

  });

});
</script>

</body>
</html>
