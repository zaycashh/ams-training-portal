<script>

/* =========================
   WAIT FOR PAGE TO LOAD
========================= */
document.addEventListener("DOMContentLoaded", () => {

  /* =========================
     GET PROGRAM FROM URL
  ========================= */
  const urlParams = new URLSearchParams(window.location.search);
  const program = urlParams.get("program") || "faa";

  const form = document.getElementById("companyRegisterForm");

  if (!form) {
    console.error("Form not found");
    return;
  }

  form.addEventListener("submit", function (e) {

    e.preventDefault();

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const companyName = document.getElementById("companyName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!firstName || !lastName || !companyName || !phone || !email || !password || !confirmPassword) {
      alert("Please complete all fields.");
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters.");
      return;
    }

    if (password !== confirmPassword) {
      alert("Passwords do not match.");
      return;
    }

    const users = JSON.parse(localStorage.getItem("ams_users") || "[]");

    const existingUser = users.find(u => u.email === email);
    if (existingUser) {
      alert("An account with this email already exists.");
      return;
    }

    const companyId = "comp-" + Date.now();

    const companyProfile = {
      id: companyId,
      name: companyName,
      createdAt: Date.now(),
      seats: {
        employee: { total: 5, used: 0 }
      },
      usedSeats: {},
      invites: {},
      modules: [],
      employees: {}
    };

    localStorage.setItem("companyProfile", JSON.stringify(companyProfile));

    /* 🔥 USER WITH PROGRAM */
    const companyAdminUser = {
      id: "admin-" + email,
      firstName,
      lastName,
      company: companyName,
      phone,
      email,
      password,
      role: "company_admin",
      type: "company",
      companyId,
      program, // 🔥 IMPORTANT
      createdAt: Date.now()
    };

    users.push(companyAdminUser);
    localStorage.setItem("ams_users", JSON.stringify(users));

    localStorage.setItem("amsUser", JSON.stringify(companyAdminUser));
    localStorage.setItem("amsProgram", program);

    window.location.replace("company-dashboard.html");

  });

});
</script>
