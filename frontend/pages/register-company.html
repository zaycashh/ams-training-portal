<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Company Account | AMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/frontend/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
</head>

<body>

<main class="auth-container">
  <div class="auth-card">

    <div class="back-link">
      <a href="register-select.html">← Back to Registration Options</a>
    </div>

    <h2>Create Company Account</h2>
    <p>This account is for company administrators who manage employee seats.</p>

    <div id="msgBox" style="display:none;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:14px;"></div>

    <form id="companyRegisterForm" class="auth-form">

      <div class="form-row">
        <label>First Name</label>
        <input type="text" id="firstName" required />
      </div>

      <div class="form-row">
        <label>Last Name</label>
        <input type="text" id="lastName" required />
      </div>

      <div class="form-row">
        <label>Company Name</label>
        <input type="text" id="companyName" required />
      </div>

      <div class="form-row">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="(123) 456-7890" required />
      </div>

      <div class="form-row">
        <label>Email Address</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-row">
        <label>Password</label>
        <input type="password" id="password" required />
      </div>

      <div class="form-row">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" required />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Create Company Account</button>
      </div>

      <p style="margin-top:14px;text-align:center;">
        Already have an account? <a href="login.html">Login</a>
      </p>

    </form>
  </div>
</main>

<script>
function showMsg(msg, type) {
  const box = document.getElementById("msgBox");
  box.style.display = "block";
  box.style.background = type === "error" ? "#fef2f2" : type === "success" ? "#f0fdf4" : "#eff6ff";
  box.style.color = type === "error" ? "#dc2626" : type === "success" ? "#16a34a" : "#2563eb";
  box.textContent = msg;
}

document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("companyRegisterForm");
  if (!form) return;

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const firstName       = document.getElementById("firstName").value.trim();
    const lastName        = document.getElementById("lastName").value.trim();
    const companyName     = document.getElementById("companyName").value.trim();
    const phone           = document.getElementById("phone").value.trim();
    const email           = document.getElementById("email").value.trim().toLowerCase();
    const password        = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const program         = (new URLSearchParams(window.location.search).get("program") || "faa").toLowerCase();

    if (!firstName || !lastName || !companyName || !phone || !email || !password || !confirmPassword) {
      showMsg("Please complete all fields.", "error"); return;
    }
    if (password.length < 6) {
      showMsg("Password must be at least 6 characters.", "error"); return;
    }
    if (password !== confirmPassword) {
      showMsg("Passwords do not match.", "error"); return;
    }

    showMsg("Creating your account...", "info");

    try {
      /* 1. Check duplicate email */
      const { data: existing } = await db.from("users").select("id").eq("email", email);
      if (existing && existing.length > 0) {
        showMsg("An account with this email already exists.", "error"); return;
      }

      /* 2. Create company in Supabase */
      const { data: company, error: companyErr } = await db.from("companies").insert([{
        name:        companyName,
        admin_email: email,
        program,
        seats: {
          employee:   { total: 0, used: 0 },
          supervisor: { total: 0, used: 0 },
          der:        { total: 0, used: 0 }
        }
      }]).select().single();

      if (companyErr) throw companyErr;

      /* 3. Create admin user in Supabase */
      const { data: newUser, error: userErr } = await db.from("users").insert([{
        email,
        password_hash: password,
        name:          firstName + " " + lastName,
        type:          "company",
        role:          "company_admin",
        program,
        company_id:    company.id,
        verified:      true
      }]).select().single();

      if (userErr) throw userErr;

      /* 4. Set localStorage session (same shape as before) */
      const sessionUser = {
        id:        newUser.id,
        firstName,
        lastName,
        fullName:  firstName + " " + lastName,
        company:   companyName,
        phone,
        email,
        role:      "company_admin",
        type:      "company",
        companyId: company.id,
        program
      };

      const profileKey = program === "fmcsa" ? "companyProfile_fmcsa" : "companyProfile_faa";
      const companyProfile = {
        id:       company.id,
        name:     companyName,
        email,
        program,
        seats:    company.seats,
        invites:  {},
        usedSeats: { employee: {}, supervisor: {}, der: {} }
      };

      localStorage.setItem("amsUser",      JSON.stringify(sessionUser));
      localStorage.setItem("amsProgram",   program);
      localStorage.setItem(profileKey,     JSON.stringify(companyProfile));
      localStorage.setItem("companyProfile", JSON.stringify(companyProfile));

      showMsg("Account created! Redirecting...", "success");
      setTimeout(() => window.location.href = "company-dashboard.html", 1000);

    } catch (err) {
      console.error("Register company error:", err);
      showMsg("Something went wrong. Please try again.", "error");
    }
  });
});
</script>

</body>
</html>
