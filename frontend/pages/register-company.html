<script>
document.addEventListener("DOMContentLoaded", function () {

  /* =========================
     SAFE FORM SELECT
  ========================= */
  const form = document.querySelector("form");

  if (!form) {
    alert("Form not found — check HTML");
    return;
  }

  form.addEventListener("submit", function (e) {

    e.preventDefault();

    /* =========================
       GET INPUTS
    ========================= */
    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const companyName = document.getElementById("companyName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    /* =========================
       VALIDATION
    ========================= */
    if (!firstName || !lastName || !companyName || !phone || !email || !password || !confirmPassword) {
      alert("Please complete all fields.");
      return;
    }

    if (password.length < 6) {
      alert("Password must be at least 6 characters.");
      return;
    }

    if (password !== confirmPassword) {
      alert("Passwords do not match.");
      return;
    }

    /* =========================
       USERS DB
    ========================= */
    const users = JSON.parse(localStorage.getItem("ams_users") || "[]");

    if (users.find(u => u.email === email)) {
      alert("An account with this email already exists.");
      return;
    }

    /* =========================
       COMPANY PROFILE
    ========================= */
    const companyId = "comp-" + Date.now();

    const companyProfile = {
      id: companyId,
      name: companyName,
      createdAt: Date.now(),
      seats: {
        employee: { total: 5, used: 0 }
      },
      usedSeats: {},
      invites: {},
      modules: [],
      employees: {}
    };

    localStorage.setItem("companyProfile", JSON.stringify(companyProfile));

    /* =========================
       PROGRAM FROM URL
    ========================= */
    const program =
      new URLSearchParams(window.location.search).get("program") || "faa";

    /* =========================
       CREATE USER
    ========================= */
    const user = {
      id: "admin-" + email,
      firstName,
      lastName,
      company: companyName,
      phone,
      email,
      password,
      role: "company_admin",
      type: "company",
      companyId,
      program,
      createdAt: Date.now()
    };

    users.push(user);
    localStorage.setItem("ams_users", JSON.stringify(users));

    /* =========================
       SESSION START
    ========================= */
    localStorage.setItem("amsUser", JSON.stringify(user));
    localStorage.setItem("amsProgram", program);

    /* =========================
       REDIRECT
    ========================= */
    window.location.href = "company-dashboard.html";

  });

});
</script>
