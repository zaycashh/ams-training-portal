<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My Certificates | AMS Training Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../css/main.css" />
</head>

<body>

<header class="portal-header">
  <div class="header-inner">
    <h1>My Certificates</h1>
    <div class="module-controls">
      <button class="btn-secondary" onclick="goDashboard()">
        Return to Dashboard
      </button>
    </div>
  </div>
</header>

<main class="dashboard-container">
  <div id="certList" class="modules-grid"></div>
</main>

<script src="../js/certificate-engine.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const user = JSON.parse(localStorage.getItem("amsUser"));
  if(!user) return;

  const key = `amsCertificates_${user.email}`;
  const certs = JSON.parse(localStorage.getItem(key) || "[]");

  const container = document.getElementById("certList");

  // detect user access
  const hasFMCSA = localStorage.getItem("paid_fmcsa") === "true";
  const hasFAA =
    localStorage.getItem("paid_der") === "true" ||
    localStorage.getItem("paid_supervisor") === "true" ||
    localStorage.getItem("paid_employee") === "true";

  // filter certificates
  const myCerts = certs.filter(cert => {
    if (hasFMCSA && cert.course.includes("FMCSA")) return true;
    if (hasFAA && !cert.course.includes("FMCSA")) return true;
    return false;
  });

  if(myCerts.length === 0){
    container.innerHTML = "<p>No certificates yet.</p>";
    return;
  }

  /* ===============================
     COMBINE MODULE A + B
  =============================== */

const combined = [];
let hasSupervisorFMCSA = false;
let hasFAADER = false;

myCerts.forEach(cert => {

  const isFMCSA = cert.course.includes("FMCSA");
  const isFAA = cert.course.includes("FAA");

  const isModuleA = cert.course.includes("Reasonable Suspicion");
  const isModuleB = cert.course.includes("Substance Abuse");

  const isEmployee = cert.course.includes("Employee");
  const isDER = cert.course.includes("DER");

  /* ===============================
     FMCSA (LEAVE WORKING)
  =============================== */
  if (isFMCSA && (isModuleA || isModuleB)) {

    if (!hasSupervisorFMCSA) {
      combined.push({
        ...cert,
        course: "FMCSA Supervisor Reasonable Suspicion & Drug and Alcohol Awareness Training"
      });
      hasSupervisorFMCSA = true;
    }

  }

  /* ===============================
     FAA DER (REMOVE DUPLICATES)
  =============================== */
  else if (isFAA && isDER) {

    if (!hasFAADER) {
      combined.push({
        ...cert,
        course: "FAA DER Training"
      });
      hasFAADER = true;
    }

  }

  /* ===============================
     FAA SUPERVISOR
  =============================== */
  else if (isFAA && isModuleA) {

    combined.push({
      ...cert,
      course: "FAA Supervisor Training"
    });

  }

  /* ===============================
     FAA EMPLOYEE
  =============================== */
  else if (isFAA && isEmployee) {

    combined.push({
      ...cert,
      course: "FAA Employee Training"
    });

  }

  /* ===============================
     EVERYTHING ELSE SAFE
  =============================== */
  else {
    combined.push(cert);
  }

});

  const isFMCSA = cert.course.includes("FMCSA");

  const isModuleA = cert.course.includes("Reasonable Suspicion");
  const isModuleB = cert.course.includes("Substance Abuse"); // 👈 IMPORTANT

  const isEmployee = cert.course.includes("Employee");
  const isDER = cert.course.includes("DER");

  // 🔥 ONLY combine TRUE Module A + B
  if (isFMCSA && (isModuleA || isModuleB)) {

    if (!hasSupervisor) {
      combined.push({
        ...cert,
        course: "FMCSA Supervisor Reasonable Suspicion & Drug and Alcohol Awareness Training"
      });
      hasSupervisor = true;
    }

  }

  // ✅ KEEP EMPLOYEE SAFE (THIS FIXES YOUR ISSUE)
  else if (isEmployee) {
    combined.push(cert);
  }

  // ✅ KEEP DER SAFE
  else if (isDER) {
    combined.push(cert);
  }

  // ✅ EVERYTHING ELSE (FAA etc.)
  else {
    combined.push(cert);
  }

});

  /* ===============================
     RENDER CARDS
  =============================== */

  combined.forEach(cert => {

    const div = document.createElement("div");
    div.className = "module-card";

    div.innerHTML = `
      <h3>
${
  cert.course.includes("Employee")
    ? "FMCSA Employee Drug & Alcohol Awareness Training"
    : cert.course
}
</h3>
      <p><strong>Name:</strong> ${cert.name}</p>
      <p><strong>Date:</strong> ${new Date(cert.date).toLocaleDateString("en-US")}</p>
      <p><strong>ID:</strong> ${cert.id}</p>

      <button class="btn-primary" onclick="openCertificate('${cert.id}')">
        View Certificate
      </button>
    `;

    container.appendChild(div);

  });

});

function verifyCert(id){
  window.location.href = "verify.html?id=" + id;
}

function goDashboard(){
  window.location.href = "dashboard.html";
}

function openCertificate(id){

  const user = JSON.parse(localStorage.getItem("amsUser"));
  const key = `amsCertificates_${user.email}`;
  const certs = JSON.parse(localStorage.getItem(key) || "[]");

  const cert = certs.find(c => c.id === id);

  if(!cert){
    alert("Certificate not found");
    return;
  }

  // route correctly
  if(cert.course.includes("FMCSA")){
    window.location.href = "fmcsa-certificates.html?id=" + id;
  } else {
    window.location.href = "faa-certificates.html?id=" + id;
  }

}
</script>

</body>
</html>
